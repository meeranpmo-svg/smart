      </div>
      <div className="audio-area">
        <div className="checker"/>
        <div style={{zIndex:1,textAlign:'center',padding:20}}>
          {tab==='tts'&&(
            <div style={{color:'var(--muted)'}}>
              <div style={{fontSize:64,marginBottom:16}}>🔊</div>
              <div style={{fontSize:18,fontWeight:600,color:'var(--text)',marginBottom:8}}>Text to Voice</div>
              <div style={{fontSize:13,maxWidth:380,lineHeight:1.6}}>
                Convert Tamil &amp; English text to speech using your browser's voice engine.<br/>
                Supports Tamil (ta-IN) and English (en-US) voices.<br/><br/>
                <span style={{color:'var(--accent)'}}>Tip: Use the Tamil keyboard or phonetic input for Tamil text.</span>
              </div>
            </div>
          )}
          {tab==='record'&&(
            <div style={{color:'var(--muted)'}}>
              <div style={{fontSize:64,marginBottom:16}}>🎙</div>
              <div style={{fontSize:18,fontWeight:600,color:'var(--text)',marginBottom:8}}>Voice Recorder</div>
              <div style={{fontSize:13,maxWidth:380,lineHeight:1.6}}>
                Record your voice or any audio from your microphone.<br/>
                Adjust playback speed and download as a WebM audio file.<br/><br/>

              </div>

          )}

    </>
  );
}

const AI_STYLES={
  Realistic:'hyperrealistic, 8k UHD, professional DSLR photography, sharp focus, natural light',
  Artistic:'digital art, artstation trending, painterly, highly detailed illustration',
  Cinematic:'cinematic movie still, dramatic lighting, 4k, film grain, wide angle',

  Portrait:'portrait photography, studio lighting, 85mm lens, bokeh background, sharp eyes',
  Nature:'landscape photography, golden hour, lush, National Geographic style',
  Minimal:'minimalist, clean lines, white background, product photography',
};
const SAMPLES_EN=[
  'Beautiful Tamil Nadu village at sunset with coconut trees',
  'Colorful kolam rangoli on a temple floor',
  'Marina Beach Chennai at golden hour',
  'Traditional Tamil woman in silk saree with flowers',
  'Ancient Chola temple architecture',
  'Vibrant Tamil festival celebration with lamps',
];
const SAMPLES_TA=[
  'அழகான தமிழ்நாடு கிராமம் மாலை நேரம்',
  'கோவில் வாயிலில் பூக்கோலம்',
  'சென்னை மரினா கடற்கரை',
  'பட்டுச் சேலையில் தமிழ் பெண்',
  'சோழர் கோவில் கட்டிடம்',
  'தீபாவளி விளக்குகள் திருவிழா',
];

function AIMode(){
  const [tab,setTab]=useState('image');
  const [prompt,setPrompt]=useState('');
  const [transPrompt,setTransPrompt]=useState('');
  const [listening,setListening]=useState(false);
  const [voiceLang,setVoiceLang]=useState('en');
  const [generating,setGenerating]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState('');
  const [selStyle,setSelStyle]=useState('Realistic');
  const [progress,setProgress]=useState('');

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Voice recognition not supported — use Chrome or Edge');return;}
    const r=new SR();
    r.lang=voiceLang==='ta'?'ta-IN':'en-US';
    r.interimResults=false;
    r.onstart=()=>setListening(true);
    r.onend=()=>setListening(false);
    r.onerror=()=>setListening(false);
    r.onresult=(e)=>setPrompt(e.results[0][0].transcript);
    r.start();
  };

  const translateTA=async(text)=>{
    try{
      const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ta|en`);
      const d=await r.json();
      return d.responseData?.translatedText||text;
    }catch{return text;}
  };

  const generate=async()=>{
    if(!prompt.trim()){setError('Please enter a description / விவரம் உள்ளிடவும்');return;}
    setGenerating(true);setError('');setResult(null);setTransPrompt('');

    let eng=prompt;
    // Auto-detect Tamil Unicode and translate
    if(/[\u0B80-\u0BFF]/.test(prompt)){
      setProgress('Translating Tamil → English…');
      eng=await translateTA(prompt);
      setTransPrompt(eng);
    }

    const fullPrompt=`${eng}, ${AI_STYLES[selStyle]}`;

    if(tab==='image'){
      // Pollinations AI — instant, 100% free, no token needed
      setProgress('Generating image…');
      try{
        const seed=Math.floor(Math.random()*99999);
        const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=1024&height=1024&model=flux&nologo=true&seed=${seed}`;
        setResult({url,type:'image',prompt:eng});
      }catch(e){
        setError(e.message);
      }finally{
        setGenerating(false);setProgress('');
      }
    } else {
      // ── Free AI Slideshow Video — 4 Pollinations frames → canvas → WebM ──
      try{
        const frames=[];
        for(let i=0;i<4;i++){
          setProgress(`Generating frame ${i+1} of 4… (free, no token needed)`);
          const seed=Math.floor(Math.random()*99999)+i*17777;
          const imgUrl=`https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=1280&height=720&model=flux&nologo=true&seed=${seed}`;
          await new Promise((res,rej)=>{
            const img=new Image();
            img.crossOrigin='anonymous';
            img.onload=()=>{frames.push(img);res();};
            img.onerror=rej;
            img.src=imgUrl;
          });
        }
        setProgress('Composing slideshow video…');
        const canvas=document.createElement('canvas');
        canvas.width=1280;canvas.height=720;
        const ctx=canvas.getContext('2d');
        const mimeType=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
        const stream=canvas.captureStream(30);
        const recorder=new MediaRecorder(stream,{mimeType,videoBitsPerSecond:4000000});
        const chunks=[];
        recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
        const videoUrl=await new Promise(resolve=>{
          recorder.onstop=()=>{
            const blob=new Blob(chunks,{type:'video/webm'});
            resolve(URL.createObjectURL(blob));
          };
          recorder.start(100);
          const FRAME_MS=2800;
          const start=Date.now();
          const draw=()=>{
            const elapsed=Date.now()-start;
            if(elapsed>=frames.length*FRAME_MS){recorder.stop();return;}
            const fi=Math.floor(elapsed/FRAME_MS)%frames.length;
            const fp=(elapsed%FRAME_MS)/FRAME_MS;
            const scale=1+fp*0.06;
            const ox=(canvas.width*(scale-1))/2;
            const oy=(canvas.height*(scale-1))/2;
            ctx.save();
            ctx.translate(-ox,-oy);
            ctx.scale(scale,scale);
            ctx.drawImage(frames[fi],0,0,canvas.width,canvas.height);
            ctx.restore();
            requestAnimationFrame(draw);
          };
          draw();
        });
        setResult({url:videoUrl,type:'video',prompt:eng});
      }catch(e){
        setError('Video generation failed: '+e.message);
      }finally{
        setGenerating(false);setProgress('');
      }
    }
  };

  const download=()=>{
    if(!result)return;
    const a=document.createElement('a');
    a.href=result.url;
    a.download=`smartedit_ai_${result.type}_${Date.now()}.${result.type==='video'?'mp4':'png'}`;
    a.click();
  };

  const samples=voiceLang==='ta'?SAMPLES_TA:SAMPLES_EN;

  return(
    <div className="ai-wrap">
      {/* ── Side panel ── */}
      <div className="ai-side">
        <div className="pbody">
          {/* Sub-tabs */}
          <div style={{display:'flex',gap:4,marginBottom:14}}>
            <button className={`btn ${tab==='image'?'bp':'bs'}`} style={{flex:1}}
              onClick={()=>{setTab('image');setResult(null);}}>🖼 AI Image</button>
            <button className={`btn ${tab==='video'?'bp':'bs'}`} style={{flex:1}}
              onClick={()=>{setTab('video');setResult(null);}}>🎬 AI Video</button>
          </div>

          {/* Token — only needed for video */}
          <div style={{padding:'8px 10px',background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.3)',borderRadius:6,fontSize:11,color:'var(--green)',marginBottom:10}}>
            ✅ {tab==='image'?'AI Image':'AI Video'} is <b>100% free</b> — no login, no token needed!
            {tab==='video'&&<div style={{marginTop:3,color:'var(--muted)',fontSize:10}}>Generates 4 AI frames → cinematic slideshow (WebM video)</div>}
          </div>

          {/* Voice language */}
          <div className="stitle">Input Language · மொழி</div>
          <div className="lang-tabs">
            <button className={`lang-tab ${voiceLang==='en'?'on':''}`} onClick={()=>setVoiceLang('en')}>🇬🇧 English</button>
            <button className={`lang-tab ${voiceLang==='ta'?'on':''}`} onClick={()=>setVoiceLang('ta')}>🇮🇳 தமிழ்</button>
          </div>

          {/* Prompt */}
          <div className="tig">
            <label>{voiceLang==='ta'?'படம் விவரி (தமிழ் / English):':'Describe your image / video:'}</label>
            <div style={{display:'flex',gap:6,alignItems:'flex-start'}}>
              <textarea className="tinp" rows={4} style={{flex:1,resize:'none'}}
                placeholder={voiceLang==='ta'?'உதா: அழகான தமிழ்நாடு கிராமம், மாலை நேரம், தென்னை மரங்கள்…':'e.g. Beautiful Tamil Nadu village at sunset with coconut trees…'}
                value={prompt} onChange={e=>setPrompt(e.target.value)}/>
              <button className={`voice-btn ${listening?'listening':''}`} onClick={startVoice}
                title="Voice input / குரல் உள்ளீடு">
                {listening?'⬛':'🎤'}
              </button>
            </div>
            {transPrompt&&(
              <div className="tip" style={{marginTop:5}}>
                🔄 Translated: <i style={{color:'var(--text)'}}>{transPrompt}</i>
              </div>
            )}
          </div>

          {/* Sample prompts */}
          <div className="stitle">Quick Prompts / விரைவு</div>
          <div className="sample-pills">
            {samples.map(s=>(
              <button key={s} className="sample-pill" onClick={()=>setPrompt(s)}>{s}</button>
            ))}
          </div>

          {/* Style */}
          <div className="stitle">{tab==='video'?'Video Style':'Image Style'}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:14}}>
            {Object.keys(AI_STYLES).map(s=>(
              <button key={s} className={`style-chip ${selStyle===s?'on':''}`}
                onClick={()=>setSelStyle(s)}>{s}</button>
            ))}
          </div>

          {/* Generate button */}
          <button className="btn bp bfw" style={{fontSize:14,padding:'11px'}}
            onClick={generate} disabled={generating||!prompt.trim()}>
            {generating?`⏳ ${progress||'Generating…'}`:`✨ Generate ${tab==='image'?'Image':'Video'}`}
          </button>
          {error&&(
            <div style={{marginTop:8,padding:'8px 10px',background:'rgba(239,68,68,.1)',
              borderRadius:6,fontSize:11,color:'var(--red)',borderLeft:'3px solid var(--red)'}}>
              {error}
            </div>
          )}

          {/* Help */}
          <div className="ai-token-help">
            {tab==='image'
              ?<><b>🖼️ Powered by Pollinations AI (Flux)</b><br/>
                  100% Free · No account · No token needed<br/>
                  Type or speak → AI generates your image instantly!</>
              :<><b>🎬 AI Video — 100% Free, No Token!</b><br/>
                  Generates 4 unique AI frames → cinematic Ken Burns slideshow → WebM video<br/>
                  Takes ~20-40 seconds total</>
            }
          </div>
        </div>
      </div>

      {/* ── Stage / Result area ── */}
      <div className="ai-stage">
        <div className="checker"/>
        {generating&&(
          <div style={{zIndex:1,textAlign:'center'}}>
            <div className="ai-spinner">✨</div>
            <p style={{color:'var(--text)',fontWeight:600,marginTop:16,fontSize:16}}>{progress}</p>
            <p style={{color:'var(--muted)',fontSize:12,marginTop:6}}>
              {tab==='image'?'AI is painting your image…':'AI is creating your video frames…'}
            </p>
          </div>
        )}
        {!generating&&!result&&(
          <div style={{zIndex:1,textAlign:'center',color:'var(--dim)'}}>
            <div style={{fontSize:72,marginBottom:16}}>{tab==='image'?'🖼':'🎬'}</div>
            <p style={{fontSize:16,fontWeight:500,color:'var(--muted)'}}>
              {tab==='image'?'AI Image will appear here':'AI Video will appear here'}
            </p>
            <p style={{fontSize:12,marginTop:8}}>Type or speak your prompt → click Generate</p>
          </div>
        )}
        {result&&!generating&&(
          <div style={{zIndex:1,textAlign:'center',padding:20,maxWidth:'90%'}}>
            {result.type==='image'
              ?<img src={result.url} alt="AI Generated" className="ai-result-img"
                  onLoad={e=>e.target.style.opacity=1}
                  onError={()=>setError('Image failed to load. Check your internet connection and try again.')}
                  style={{opacity:0,transition:'opacity .5s'}}/>
              :<video src={result.url} controls autoPlay loop className="ai-result-vid"/>
            }
            <div style={{marginTop:14,display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
              <button className="btn bp" onClick={download}>
                ⬇ Download {result.type==='image'?'Image':'Video'}
              </button>
              <button className="btn bs" onClick={()=>setResult(null)}>✕ New</button>
            </div>
            <div style={{marginTop:8,fontSize:10,color:'var(--muted)'}}>
              Prompt: <i>{result.prompt}</i> · Style: {selStyle}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AutomatePanel({bizName,bizType,city}){
  const REDIRECT=window.location.href.split('#')[0].split('?')[0];
  const [fbAppId,setFbAppId]=useState(()=>localStorage.getItem('fb_app_id')||'');
  const [gClientId,setGClientId]=useState(()=>localStorage.getItem('g_client_id')||'');
  const [showSetup,setShowSetup]=useState(false);
  const [igToken,setIgToken]=useState(()=>localStorage.getItem('ig_token')||'');
  const [ytToken,setYtToken]=useState(()=>localStorage.getItem('yt_token')||'');
  const [igAcc,setIgAcc]=useState(()=>{try{return JSON.parse(localStorage.getItem('ig_acc'))||null}catch{return null}});
  const [ytCh,setYtCh]=useState(()=>{try{return JSON.parse(localStorage.getItem('yt_ch'))||null}catch{return null}});
  const [autoTab,setAutoTab]=useState('ig');
  const [igComments,setIgComments]=useState([]);
  const [ytComments,setYtComments]=useState([]);
  const [fbComments,setFbComments]=useState([]);
  const [fbPage,setFbPage]=useState(()=>{try{return JSON.parse(localStorage.getItem('fb_page'))||null}catch{return null}});
  const [busy,setBusy]=useState(false);
  const [dmText,setDmText]=useState('');
  const [dmTo,setDmTo]=useState('');

  useEffect(()=>{
    // Restore sessions on load
    const igTok=localStorage.getItem('ig_token');
    const ytTok=localStorage.getItem('yt_token');
    if(igTok&&!igAcc)fetchIGAcc(igTok);
    if(igTok&&!fbPage)fetchFBPage(igTok);
    if(ytTok&&!ytCh)fetchYTCh(ytTok);
  },[]);

  const connectIG=()=>{setShowSetup(true);};
  const connectYT=()=>{setShowSetup(true);};
  const connectGB=()=>{setShowSetup(true);};

  const fetchIGAcc=async(tok)=>{
    try{
      const pages=await(await fetch(`https://graph.facebook.com/v18.0/me/accounts?access_token=${tok}`)).json();
      if(!pages.data?.length){alert('No Facebook Pages found. Make sure your Instagram is linked to a Facebook Page.');return;}
      const page=pages.data[0];
      const igRef=await(await fetch(`https://graph.facebook.com/v18.0/${page.id}?fields=instagram_business_account&access_token=${page.access_token}`)).json();
      if(!igRef.instagram_business_account){alert('No Instagram Business Account linked to this page.');return;}
      const id=igRef.instagram_business_account.id;
      const info=await(await fetch(`https://graph.facebook.com/v18.0/${id}?fields=username,name,followers_count,media_count,profile_picture_url&access_token=${page.access_token}`)).json();
      const acc={...info,pt:page.access_token};
      setIgAcc(acc);localStorage.setItem('ig_acc',JSON.stringify(acc));
    }catch(e){alert('Failed to load Instagram account: '+e.message);}
  };

  const fetchYTCh=async(tok)=>{
    try{
      const d=await(await fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&mine=true',{headers:{Authorization:`Bearer ${tok}`}})).json();
      const ch=d.items?.[0];
      if(!ch){alert('No YouTube channel found.');return;}
      const acc={id:ch.id,title:ch.snippet.title,thumb:ch.snippet.thumbnails?.default?.url,subs:ch.statistics.subscriberCount,vids:ch.statistics.videoCount};
      setYtCh(acc);localStorage.setItem('yt_ch',JSON.stringify(acc));
    }catch(e){alert('Failed to load YouTube channel: '+e.message);}
  };

  const fetchFBPage=async(tok)=>{
    try{
      const pages=await(await fetch(`https://graph.facebook.com/v18.0/me/accounts?access_token=${tok}`)).json();
      if(!pages.data?.length){alert('No Facebook Pages found.');return;}
      const page=pages.data[0];
      const info=await(await fetch(`https://graph.facebook.com/v18.0/${page.id}?fields=name,fan_count,picture&access_token=${page.access_token}`)).json();
      const p={...info,pt:page.access_token};
      setFbPage(p);localStorage.setItem('fb_page',JSON.stringify(p));
    }catch(e){alert('Failed to load Facebook Page: '+e.message);}
  };

  const fetchFBComments=async()=>{
    if(!fbPage)return;setBusy(true);
    try{
      const posts=await(await fetch(`https://graph.facebook.com/v18.0/${fbPage.id}/posts?fields=id,message,comments.limit(5){id,message,from}&limit=5&access_token=${fbPage.pt}`)).json();
      let all=[];
      for(const post of(posts.data||[])){
        for(const c of(post.comments?.data||[])){
          all.push({id:c.id,text:c.message,username:c.from?.name||'User',postId:post.id,reply:'',aiDone:false,sent:false});
        }
      }
      setFbComments(all);
    }catch(e){alert('Error: '+e.message);}
    setBusy(false);
  };

  const sendFBReply=async(c,i)=>{
    try{
      const fd=new URLSearchParams({message:c.reply,access_token:fbPage.pt});
      const res=await fetch(`https://graph.facebook.com/v18.0/${c.id}/comments`,{method:'POST',body:fd});
      const d=await res.json();
      if(d.error)throw new Error(d.error.message);
      const u=[...fbComments];u[i]={...u[i],sent:true};setFbComments(u);
    }catch(e){alert('Send failed: '+e.message);}
  };

  const fetchIGComments=async()=>{
    if(!igAcc)return;setBusy(true);
    try{
      const media=await(await fetch(`https://graph.facebook.com/v18.0/${igAcc.id}/media?fields=id,caption,comments_count&limit=6&access_token=${igAcc.pt}`)).json();
      let all=[];
      for(const post of(media.data||[])){
        if(post.comments_count>0){
          const cc=await(await fetch(`https://graph.facebook.com/v18.0/${post.id}/comments?fields=id,text,timestamp,username&access_token=${igAcc.pt}`)).json();
          all.push(...(cc.data||[]).map(c=>({...c,postId:post.id,reply:'',aiDone:false,sent:false})));
        }
      }
      setIgComments(all);
    }catch(e){alert('Error: '+e.message);}
    setBusy(false);
  };

  const fetchYTComments=async()=>{
    if(!ytToken||!ytCh)return;setBusy(true);
    try{
      const d=await(await fetch(`https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&allThreadsRelatedToChannelId=${ytCh.id}&maxResults=25&order=time`,{headers:{Authorization:`Bearer ${ytToken}`}})).json();
      const comments=(d.items||[]).map(i=>({
        id:i.snippet.topLevelComment.id,
        text:i.snippet.topLevelComment.snippet.textDisplay,
        author:i.snippet.topLevelComment.snippet.authorDisplayName,
        videoId:i.snippet.videoId,reply:'',aiDone:false,sent:false
      }));
      setYtComments(comments);
    }catch(e){alert('Error: '+e.message);}
    setBusy(false);
  };

  const aiReply=async(comment,i,list,setList)=>{
    const p=`Write a friendly professional reply for a ${bizType} business "${bizName||'our business'}" in ${city}, Tamil Nadu to this comment: "${comment.text.replace(/"/g,"'")}". Keep it 1-2 sentences, warm, no hashtags.`;
    try{
      const r=await fetch(`https://text.pollinations.ai/${encodeURIComponent(p)}?model=openai-fast&seed=${Date.now()}`);
      const txt=await r.text();
      const u=[...list];u[i]={...u[i],reply:txt.trim(),aiDone:true};setList(u);
    }catch{alert('Failed to generate reply');}
  };

  const sendIGReply=async(c,i)=>{
    try{
      const fd=new URLSearchParams({message:c.reply,access_token:igAcc.pt});
      const res=await fetch(`https://graph.facebook.com/v18.0/${c.postId}/comments`,{method:'POST',body:fd});
      const d=await res.json();
      if(d.error)throw new Error(d.error.message);
      const u=[...igComments];u[i]={...u[i],sent:true};setIgComments(u);
    }catch(e){alert('Send failed: '+e.message);}
  };

  const sendYTReply=async(c,i)=>{
    try{
      const res=await fetch('https://www.googleapis.com/youtube/v3/comments?part=snippet',{
        method:'POST',headers:{Authorization:`Bearer ${ytToken}`,'Content-Type':'application/json'},
        body:JSON.stringify({snippet:{parentId:c.id,textOriginal:c.reply}})
      });
      const d=await res.json();
      if(d.error)throw new Error(d.error.message);
      const u=[...ytComments];u[i]={...u[i],sent:true};setYtComments(u);
    }catch(e){alert('Send failed: '+e.message);}
  };

  const autoReplyAll=async(list,setList,sendFn)=>{
    if(!list.filter(c=>!c.sent).length){alert('No pending comments to reply.');return;}
    let updated=[...list];
    for(let i=0;i<updated.length;i++){
      if(updated[i].sent)continue;
      if(!updated[i].aiDone){
        const p=`Friendly professional 1-sentence reply from ${bizName||'our business'} (${bizType}) in ${city} to: "${updated[i].text.replace(/"/g,"'")}". No hashtags.`;
        try{
          const r=await fetch(`https://text.pollinations.ai/${encodeURIComponent(p)}?model=openai-fast&seed=${i}`);
          updated[i]={...updated[i],reply:(await r.text()).trim(),aiDone:true};
          setList([...updated]);
        }catch{}
      }
      try{await sendFn(updated[i],i);await new Promise(r=>setTimeout(r,700));}catch{}
    }
    alert('✅ Auto-reply complete!');
  };

  const CCard=({c,i,list,setList,sendFn})=>(
    <div style={{padding:12,background:'var(--panel2)',borderRadius:8,border:'1px solid var(--border)',marginBottom:8}}>
      <div style={{fontSize:11,color:'var(--muted)',marginBottom:3}}>@{c.username||c.author}</div>
      <div style={{fontSize:12,marginBottom:8,lineHeight:1.5}}>{c.text}</div>
      {c.sent
        ?<span style={{fontSize:11,color:'var(--green)'}}>✅ Reply sent</span>
        :c.aiDone
          ?<div>
            <textarea className="tinp" rows={2} value={c.reply}
              onChange={e=>{const u=[...list];u[i]={...u[i],reply:e.target.value};setList(u);}}
              style={{width:'100%',fontSize:11,marginBottom:6,resize:'none'}}/>
            <button className="btn bp bfw" style={{fontSize:11}} onClick={()=>sendFn(c,i)}>↑ Send Reply</button>
          </div>
          :<button className="btn bs bfw" style={{fontSize:11}} onClick={()=>aiReply(c,i,list,setList)}>✨ Generate AI Reply</button>
      }
    </div>
  );

  return(
    <div style={{flex:1,overflow:'auto',padding:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:15}}>🤖 Connect & Automate</div>
        <button className="btn bs" style={{fontSize:11}} onClick={()=>setShowSetup(v=>!v)}>⚙️ Setup</button>
      </div>

      {showSetup&&(
        <div style={{padding:14,background:'var(--panel)',borderRadius:10,border:'1px solid var(--border)',marginBottom:16}}>
          <div className="stitle">⚡ Quick Token Setup</div>
          <div className="tip" style={{marginBottom:12}}>No app creation needed! Just copy-paste your access token. Tokens are saved only on your device.</div>

          {/* Facebook / Instagram Token */}
          <div style={{marginBottom:14,padding:12,background:'var(--panel2)',borderRadius:8,border:'1px solid var(--border)'}}>
            <div style={{fontWeight:600,fontSize:12,marginBottom:6}}>📘 Facebook + 📸 Instagram Token</div>
            <div style={{fontSize:11,color:'var(--muted)',marginBottom:8,lineHeight:1.8}}>
              1. Open <b><a href="https://developers.facebook.com/tools/explorer" target="_blank" style={{color:'var(--accent)'}}>developers.facebook.com/tools/explorer</a></b><br/>
              2. Click <b>"Get Token"</b> → <b>"Get User Access Token"</b><br/>
              3. Tick these permissions: <b>pages_show_list, pages_read_engagement, instagram_basic, instagram_manage_comments, pages_manage_posts</b><br/>
              4. Click <b>"Generate Access Token"</b> → Copy the token<br/>
              5. Paste below 👇
            </div>
            <div style={{display:'flex',gap:6}}>
              <input className="tinp" style={{flex:1,fontSize:11}} placeholder="Paste Facebook / Instagram token here…"
                value={fbAppId} onChange={e=>{setFbAppId(e.target.value);localStorage.setItem('fb_app_id',e.target.value);}}/>
              {fbAppId&&<button className="btn bp" style={{fontSize:11,whiteSpace:'nowrap'}} onClick={()=>{
                fetchIGAcc(fbAppId);fetchFBPage(fbAppId);
                setIgToken(fbAppId);localStorage.setItem('ig_token',fbAppId);
                setShowSetup(false);
              }}>✅ Connect</button>}
            </div>
          </div>

          {/* YouTube / Google Token */}
          <div style={{padding:12,background:'var(--panel2)',borderRadius:8,border:'1px solid var(--border)'}}>
            <div style={{fontWeight:600,fontSize:12,marginBottom:6}}>▶️ YouTube + 🗺 Google Token</div>
            <div style={{fontSize:11,color:'var(--muted)',marginBottom:8,lineHeight:1.8}}>
              1. Open <b><a href="https://developers.google.com/oauthplayground" target="_blank" style={{color:'var(--accent)'}}>developers.google.com/oauthplayground</a></b><br/>
              2. In Step 1 search: <b>YouTube Data API v3</b> → select <b>youtube.force-ssl</b> → click Authorize<br/>
              3. Sign in with your Google account<br/>
              4. In Step 2 click <b>"Exchange authorization code for tokens"</b><br/>
              5. Copy <b>Access token</b> → Paste below 👇
            </div>
            <div style={{display:'flex',gap:6}}>
              <input className="tinp" style={{flex:1,fontSize:11}} placeholder="Paste YouTube / Google token here…"
                value={gClientId} onChange={e=>{setGClientId(e.target.value);localStorage.setItem('g_client_id',e.target.value);}}/>
              {gClientId&&<button className="btn bp" style={{fontSize:11,whiteSpace:'nowrap'}} onClick={()=>{
                setYtToken(gClientId);localStorage.setItem('yt_token',gClientId);
                fetchYTCh(gClientId);
                setShowSetup(false);
              }}>✅ Connect</button>}
            </div>
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:6,marginBottom:16}}>
        <button className={`btn ${autoTab==='ig'?'bp':'bs'}`} style={{flex:1,fontSize:11}} onClick={()=>setAutoTab('ig')}>📸 Instagram</button>
        <button className={`btn ${autoTab==='fb'?'bp':'bs'}`} style={{flex:1,fontSize:11,background:autoTab==='fb'?'#1877f2':undefined,borderColor:autoTab==='fb'?'#1877f2':undefined}} onClick={()=>setAutoTab('fb')}>📘 Facebook</button>
        <button className={`btn ${autoTab==='yt'?'bp':'bs'}`} style={{flex:1,fontSize:11}} onClick={()=>setAutoTab('yt')}>▶️ YouTube</button>
        <button className={`btn ${autoTab==='gb'?'bp':'bs'}`} style={{flex:1,fontSize:11}} onClick={()=>setAutoTab('gb')}>🗺 Google</button>
      </div>

      {/* ── INSTAGRAM ── */}
      {autoTab==='ig'&&(
        !igAcc
        ?<div style={{textAlign:'center',padding:32,background:'var(--panel)',borderRadius:12,border:'1px solid var(--border)'}}>
          <div style={{fontSize:52,marginBottom:10}}>📸</div>
          <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Connect Instagram</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Connect your Instagram Business account to auto-reply comments & send DMs</div>
          <button className="btn" onClick={connectIG}
            style={{background:'linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)',color:'#fff',padding:'11px 28px',borderRadius:9,fontSize:13,fontWeight:700,border:'none',cursor:'pointer'}}>
            ⚙️ Open Setup to Connect
          </button>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>Takes 1 minute — no app creation needed</div>
        </div>
        :<div>
          <div style={{display:'flex',gap:12,padding:14,background:'var(--panel)',borderRadius:10,border:'1px solid var(--border)',marginBottom:14,alignItems:'center'}}>
            {igAcc.profile_picture_url&&<img src={igAcc.profile_picture_url} style={{width:48,height:48,borderRadius:'50%',border:'2px solid var(--accent)'}} alt=""/>}
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>@{igAcc.username}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{Number(igAcc.followers_count||0).toLocaleString()} followers · {igAcc.media_count} posts</div>
            </div>
            <button className="btn bs" style={{fontSize:10,color:'var(--red)'}} onClick={()=>{
              localStorage.removeItem('ig_token');localStorage.removeItem('ig_acc');
              setIgToken('');setIgAcc(null);setIgComments([]);
            }}>✕ Disconnect</button>
          </div>

          <div className="stitle">💬 Comment Auto-Reply</div>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <button className="btn bs" style={{flex:1,fontSize:12}} onClick={fetchIGComments} disabled={busy}>
              {busy?'⏳ Loading…':'🔄 Fetch Comments'}
            </button>
            {igComments.filter(c=>!c.sent).length>0&&(
              <button className="btn bp" style={{flex:1,fontSize:12}} onClick={()=>autoReplyAll(igComments,setIgComments,sendIGReply)}>
                🤖 Auto Reply All ({igComments.filter(c=>!c.sent).length})
              </button>
            )}
          </div>
          {igComments.length===0&&!busy&&<div style={{textAlign:'center',padding:16,color:'var(--dim)',fontSize:12}}>Click "Fetch Comments" to load recent comments from your posts</div>}
          {igComments.map((c,i)=><CCard key={c.id} c={c} i={i} list={igComments} setList={setIgComments} sendFn={sendIGReply}/>)}

          <div style={{marginTop:16,padding:14,background:'var(--panel)',borderRadius:10,border:'1px solid var(--border)'}}>
            <div className="stitle">📨 Send Direct Message</div>
            <div className="tip">Requires instagram_manage_messages permission — enable in your Meta App Dashboard</div>
            <div className="tig">
              <label>Recipient Username</label>
              <input className="tinp" placeholder="@username" value={dmTo} onChange={e=>setDmTo(e.target.value)}/>
            </div>
            <div className="tig">
              <label>Message</label>
              <textarea className="tinp" rows={3} value={dmText} onChange={e=>setDmText(e.target.value)}
                style={{width:'100%',resize:'none'}} placeholder="Type message or generate with AI…"/>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn bs" style={{flex:1,fontSize:12}} onClick={async()=>{
                const p=`Write a short friendly business DM from ${bizName||'our business'} (${bizType}) in ${city}, Tamil Nadu to a potential customer. Introduce and offer value. Under 80 words, warm tone.`;
                const r=await fetch(`https://text.pollinations.ai/${encodeURIComponent(p)}?model=openai-fast&seed=${Date.now()}`);
                setDmText(await r.text());
              }}>✨ AI Write DM</button>
              <button className="btn bp" style={{flex:2,fontSize:12}} onClick={async()=>{
                if(!dmTo.trim()||!dmText.trim()){alert('Enter recipient and message');return;}
                try{
                  const res=await fetch(`https://graph.facebook.com/v18.0/${igAcc.id}/messages`,{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({recipient:{username:dmTo.replace(/^@/,'')},message:{text:dmText},access_token:igAcc.pt})
                  });
                  const d=await res.json();
                  if(d.error)throw new Error(d.error.message);
                  alert('✅ DM Sent!');setDmText('');setDmTo('');
                }catch(e){alert('Failed: '+e.message);}
              }}>↑ Send DM</button>
            </div>
          </div>
        </div>
      )}

      {/* ── FACEBOOK ── */}
      {autoTab==='fb'&&(
        !fbPage
        ?<div style={{textAlign:'center',padding:32,background:'var(--panel)',borderRadius:12,border:'1px solid var(--border)'}}>
          <div style={{fontSize:52,marginBottom:10}}>📘</div>
          <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Connect Facebook Page</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Connect your Facebook Business Page to manage comments and replies</div>
          <button className="btn" onClick={connectIG}
            style={{background:'#1877f2',color:'#fff',padding:'11px 28px',borderRadius:9,fontSize:13,fontWeight:700,border:'none',cursor:'pointer'}}>
            ⚙️ Open Setup to Connect
          </button>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>Same token as Instagram — takes 1 minute</div>
        </div>
        :<div>
          <div style={{display:'flex',gap:12,padding:14,background:'var(--panel)',borderRadius:10,border:'1px solid var(--border)',marginBottom:14,alignItems:'center'}}>
            {fbPage.picture?.data?.url&&<img src={fbPage.picture.data.url} style={{width:48,height:48,borderRadius:'50%',border:'2px solid #1877f2'}} alt=""/>}
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>{fbPage.name}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{Number(fbPage.fan_count||0).toLocaleString()} page likes</div>
            </div>
            <button className="btn bs" style={{fontSize:10,color:'var(--red)'}} onClick={()=>{
              localStorage.removeItem('fb_page');setFbPage(null);setFbComments([]);
            }}>✕ Disconnect</button>
          </div>

          <div className="stitle">💬 Comment Auto-Reply</div>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <button className="btn bs" style={{flex:1,fontSize:12}} onClick={fetchFBComments} disabled={busy}>
              {busy?'⏳ Loading…':'🔄 Fetch Comments'}
            </button>
            {fbComments.filter(c=>!c.sent).length>0&&(
              <button className="btn bp" style={{flex:1,fontSize:12,background:'#1877f2',borderColor:'#1877f2'}} onClick={()=>autoReplyAll(fbComments,setFbComments,sendFBReply)}>
                🤖 Auto Reply All ({fbComments.filter(c=>!c.sent).length})
              </button>
            )}
          </div>
          {fbComments.length===0&&!busy&&<div style={{textAlign:'center',padding:16,color:'var(--dim)',fontSize:12}}>Click "Fetch Comments" to load recent Facebook comments</div>}
          {fbComments.map((c,i)=><CCard key={c.id} c={c} i={i} list={fbComments} setList={setFbComments} sendFn={sendFBReply}/>)}
        </div>
      )}

      {/* ── YOUTUBE ── */}
      {autoTab==='yt'&&(
        !ytCh
        ?<div style={{textAlign:'center',padding:32,background:'var(--panel)',borderRadius:12,border:'1px solid var(--border)'}}>
          <div style={{fontSize:52,marginBottom:10}}>▶️</div>
          <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Connect YouTube</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Manage YouTube comments and auto-reply with AI</div>
          <button className="btn" onClick={connectYT}
            style={{background:'#ff0000',color:'#fff',padding:'11px 28px',borderRadius:9,fontSize:13,fontWeight:700,border:'none',cursor:'pointer'}}>
            ⚙️ Open Setup to Connect
          </button>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>Takes 1 minute — no app creation needed</div>
        </div>
        :<div>
          <div style={{display:'flex',gap:12,padding:14,background:'var(--panel)',borderRadius:10,border:'1px solid var(--border)',marginBottom:14,alignItems:'center'}}>
            {ytCh.thumb&&<img src={ytCh.thumb} style={{width:48,height:48,borderRadius:'50%',border:'2px solid #ff0000'}} alt=""/>}
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>{ytCh.title}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{Number(ytCh.subs||0).toLocaleString()} subscribers · {ytCh.vids} videos</div>
            </div>
            <button className="btn bs" style={{fontSize:10,color:'var(--red)'}} onClick={()=>{
              localStorage.removeItem('yt_token');localStorage.removeItem('yt_ch');
              setYtToken('');setYtCh(null);setYtComments([]);
            }}>✕ Disconnect</button>
          </div>

          <div className="stitle">💬 Comment Auto-Reply</div>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <button className="btn bs" style={{flex:1,fontSize:12}} onClick={fetchYTComments} disabled={busy}>
              {busy?'⏳ Loading…':'🔄 Fetch Comments'}
            </button>
            {ytComments.filter(c=>!c.sent).length>0&&(
              <button className="btn bp" style={{flex:1,fontSize:12}} onClick={()=>autoReplyAll(ytComments,setYtComments,sendYTReply)}>
                🤖 Auto Reply All ({ytComments.filter(c=>!c.sent).length})
              </button>
            )}
          </div>
          {ytComments.length===0&&!busy&&<div style={{textAlign:'center',padding:16,color:'var(--dim)',fontSize:12}}>Click "Fetch Comments" to load your recent YouTube comments</div>}
          {ytComments.map((c,i)=><CCard key={c.id} c={c} i={i} list={ytComments} setList={setYtComments} sendFn={sendYTReply}/>)}
        </div>
      )}

      {/* ── GOOGLE BUSINESS ── */}
      {autoTab==='gb'&&(
        <div style={{textAlign:'center',padding:32,background:'var(--panel)',borderRadius:12,border:'1px solid var(--border)'}}>
          <div style={{fontSize:52,marginBottom:10}}>🗺</div>
          <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Connect Google Business</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Auto-reply to Google reviews with AI responses</div>
          <button className="btn" onClick={connectGB}
            style={{background:'#4285f4',color:'#fff',padding:'11px 28px',borderRadius:9,fontSize:13,fontWeight:700,border:'none',cursor:'pointer'}}>
            ⚙️ Open Setup to Connect
          </button>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>Same token as YouTube — takes 1 minute</div>
          <div className="tip" style={{marginTop:16,textAlign:'left'}}>
            <b>Note:</b> Google My Business API requires your business to be verified on Google. After connecting, fetch and auto-reply to reviews the same way as YouTube comments.
          </div>
        </div>
      )}
    </div>
  );
}

function GrowMode(){
  const [tab,setTab]=useState('instagram');
  const [bizName,setBizName]=useState('');
  const [bizType,setBizType]=useState('Restaurant / Hotel');
  const [city,setCity]=useState('Chennai');
  const [lang,setLang]=useState('en');
  const [generating,setGenerating]=useState(false);
  const [result,setResult]=useState('');
  const [copied,setCopied]=useState(false);
  const [thumbUrl,setThumbUrl]=useState('');
  const [thumbLoading,setThumbLoading]=useState(false);
  const [thumbTitle,setThumbTitle]=useState('');
  const [thumbRetry,setThumbRetry]=useState(0);
  const [thumbError,setThumbError]=useState(false);
  const [rewriting,setRewriting]=useState(false);
  const [calResult,setCalResult]=useState('');
  const [calGenerating,setCalGenerating]=useState(false);
  const [calDays,setCalDays]=useState('30');

  const generate=async()=>{
    if(!bizName.trim()){setResult('⚠️ Please enter your business name first.');return;}
    setGenerating(true);setResult('');
    const biz=`${bizName} (${bizType}) in ${city}, Tamil Nadu, India`;
    let prompt='';
    if(tab==='instagram'){
      prompt=lang==='ta'
        ?`Write a creative Instagram post caption in Tamil language for ${biz}. Target local Tamil Nadu customers. Include a call to action. Then list 20 relevant hashtags mixing Tamil and English.`
        :`Write 3 creative Instagram post captions for ${biz} targeting Tamil Nadu customers. Make them engaging, include emojis. Then list 20 relevant hashtags including Tamil Nadu city tags.`;
    }else if(tab==='facebook'){
      prompt=lang==='ta'
        ?`Write a Facebook post in Tamil for ${biz}. Target Tamil Nadu customers. Include a special offer or call to action. Make it shareable and engaging. Add 10 relevant hashtags.`
        :`Write 3 Facebook post ideas for ${biz} targeting Tamil Nadu India customers. Include: 1 promotional post with offer, 1 engagement post (question/poll idea), 1 story/behind-the-scenes post. Add emojis and 10 hashtags.`;
    }else if(tab==='youtube'){
      prompt=lang==='ta'
        ?`Write YouTube video title, description in Tamil and 15 SEO tags for ${biz}. Format: Title:[title] Description:[desc] Tags:[tags]`
        :`Write a YouTube video title, 150-word description and 15 SEO tags for ${biz} targeting Tamil Nadu India audience. Format clearly as Title / Description / Tags.`;
    }else if(tab==='whatsapp'){
      prompt=lang==='ta'
        ?`Write 3 WhatsApp Business messages in Tamil for ${biz}: 1) Welcome message for new customers 2) Special offer broadcast 3) Follow-up message. Include emojis. Format clearly.`
        :`Write 3 WhatsApp Business message templates for ${biz} targeting Tamil Nadu customers: 1) Welcome/greeting message 2) Promotional offer broadcast 3) Customer follow-up. Include emojis, keep each under 200 words. Format clearly numbered.`;
    }else{
      prompt=lang==='ta'
        ?`Write a Google Business profile description in Tamil for ${biz}. Include services, why choose us, contact invitation. 200 words.`
        :`Write a compelling 250-word Google Business profile description for ${biz}. Include: what we offer, why choose us, location advantage in Tamil Nadu, call to action. Professional tone.`;
    }
    try{
      const r=await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai-fast&seed=${Date.now()}`);
      const txt=await r.text();
      setResult(txt.trim());
    }catch{
      setResult('❌ Failed to generate. Check internet connection and try again.');
    }finally{setGenerating(false);}
  };

  const rewriteCaption=async()=>{
    if(!result.trim())return;
    setRewriting(true);
    const p=`Rewrite and improve this social media caption to make it more engaging, add better emojis, stronger call-to-action, and more compelling for Tamil Nadu ${bizType} customers. Keep the core message:\n\n${result.slice(0,800)}`;
    try{
      const r=await fetch(`https://text.pollinations.ai/${encodeURIComponent(p)}?model=openai-fast&seed=${Date.now()}`);
      setResult((await r.text()).trim());
    }catch{}finally{setRewriting(false);}
  };

  const generateCalendar=async()=>{
    if(!bizName.trim()){setCalResult('⚠️ Enter your business name first.');return;}
    setCalGenerating(true);setCalResult('');
    const biz=`${bizName} (${bizType}) in ${city}, Tamil Nadu, India`;
    const p=`Create a ${calDays}-day social media content calendar for ${biz}. For each day include: Day number, Platform (Instagram/Facebook/YouTube/WhatsApp), Content Type (Post/Story/Reel/Video/Broadcast), Topic/Title, and a brief caption idea (1 sentence). Format as a clean numbered list. Focus on Tamil Nadu festivals, local events, and business promotions.`;
    try{
      const r=await fetch(`https://text.pollinations.ai/${encodeURIComponent(p)}?model=openai-fast&seed=${Date.now()}`);
      setCalResult((await r.text()).trim());
    }catch{setCalResult('❌ Failed. Try again.');}
    finally{setCalGenerating(false);}
  };

  const generateThumb=(retry=0)=>{
    if(!bizName.trim())return;
    setThumbLoading(true);setThumbError(false);setThumbRetry(retry);
    if(retry===0)setThumbUrl('');
    const title=thumbTitle.trim()||`${bizName} – Best ${bizType} in ${city}`;
    const imgPrompt=`YouTube thumbnail professional design, bold eye-catching text "${title}", vivid colors, ${bizType} business theme, Tamil Nadu India, cinematic 16:9`;
    const seed=Math.floor(Math.random()*99999)+retry*13337;
    const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(imgPrompt)}?width=1280&height=720&model=flux&nologo=true&seed=${seed}`;
    // Add progressive delay to avoid rate limits (0.8s first, 3s on retry 1, 6s on retry 2)
    const delay=retry===0?800:retry*3000;
    setTimeout(()=>setThumbUrl(url),delay);
  };

  const copy=()=>{
    if(!result)return;
    navigator.clipboard.writeText(result).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  };

  const downloadThumb=()=>{
    const a=document.createElement('a');
    a.href=thumbUrl;a.download='youtube-thumbnail.jpg';a.target='_blank';a.click();
  };

  const WA_TIPS=[
    {ic:'💬',t:'Set Up Auto-Reply',d:'Use WhatsApp Business auto-reply to greet customers instantly — reduces response time by 80%.'},
    {ic:'📢',t:'Broadcast Lists',d:'Send offers to up to 256 contacts at once using Broadcast Lists — great for festival season promotions.'},
    {ic:'🏷️',t:'Use Labels',d:'Label chats (New Customer, Order Pending, VIP) to organize and follow up faster.'},
    {ic:'📊',t:'WhatsApp Status',d:'Post daily status updates — product photos, offers, behind-the-scenes — visible to all your contacts.'},
    {ic:'🎯',t:'Quick Replies',d:'Save your most common replies as Quick Replies (/offer, /hours, /location) to respond in one tap.'},
    {ic:'📍',t:'Share Location & Catalogue',d:'Add your location and product catalogue to your profile — customers can order directly via WhatsApp.'},
    {ic:'⭐',t:'WhatsApp Pay',d:'Enable WhatsApp Pay for instant UPI payments — great for small businesses in Tamil Nadu.'},
  ];
  const tips=tab==='instagram'?IG_TIPS:tab==='youtube'?YT_TIPS:tab==='facebook'?FB_TIPS:tab==='whatsapp'?WA_TIPS:GB_TIPS;
  const hashtags=(tab==='instagram'||tab==='facebook')?(IG_HASHTAGS[bizType]||DEFAULT_HASHTAGS):null;

  return(
    <div className="ai-wrap">
      <div className="ai-side" style={{width:340}}>
        <div className="pbody">
          {/* Platform tabs */}
          <div className="stitle">Platform</div>
          <div style={{display:'flex',gap:5,marginBottom:14,flexWrap:'wrap'}}>
            <button className={`btn ${tab==='instagram'?'bp':'bs'}`} style={{flex:1,fontSize:11}} onClick={()=>setTab('instagram')}>📸 Instagram</button>
            <button className={`btn ${tab==='facebook'?'bp':'bs'}`} style={{flex:1,fontSize:11,background:tab==='facebook'?'#1877f2':undefined,borderColor:tab==='facebook'?'#1877f2':undefined}} onClick={()=>setTab('facebook')}>📘 Facebook</button>
            <button className={`btn ${tab==='youtube'?'bp':'bs'}`} style={{flex:1,fontSize:11}} onClick={()=>setTab('youtube')}>▶️ YouTube</button>
            <button className={`btn ${tab==='google'?'bp':'bs'}`} style={{flex:1,fontSize:11}} onClick={()=>setTab('google')}>🗺 Google</button>
            <button className={`btn ${tab==='whatsapp'?'bp':'bs'}`} style={{flex:1,fontSize:11,background:tab==='whatsapp'?'#25D366':undefined,borderColor:tab==='whatsapp'?'#25D366':undefined}} onClick={()=>setTab('whatsapp')}>💬 WhatsApp</button>
            <button className={`btn ${tab==='calendar'?'bp':'bs'}`} style={{flex:1,fontSize:11,background:tab==='calendar'?'linear-gradient(135deg,#f97316,#ef4444)':undefined}} onClick={()=>setTab('calendar')}>📅 Calendar</button>
            <button className={`btn ${tab==='automate'?'bp':'bs'}`} style={{width:'100%',fontSize:11,marginTop:2}} onClick={()=>setTab('automate')}>🤖 Connect & Automate</button>
          </div>

          {/* Business info */}
          <div className="stitle">Your Business Info</div>
          <div className="tig">
            <label>Business Name / கடை பெயர்</label>
            <input className="tinp" placeholder="e.g. Sri Murugan Hotel, Raji Textiles…"
              value={bizName} onChange={e=>setBizName(e.target.value)}/>
          </div>
          <div className="r2">
            <div className="tig">
              <label>Business Type</label>
              <select className="tinp" value={bizType} onChange={e=>setBizType(e.target.value)}>
                {BIZ_TYPES.map(b=><option key={b}>{b}</option>)}
              </select>
            </div>
            <div className="tig">
              <label>City</label>
              <select className="tinp" value={city} onChange={e=>setCity(e.target.value)}>
                {TN_CITIES.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          </div>

          {/* Language */}
          <div className="lang-tabs">
            <button className={`lang-tab ${lang==='en'?'on':''}`} onClick={()=>setLang('en')}>🇬🇧 English</button>
            <button className={`lang-tab ${lang==='ta'?'on':''}`} onClick={()=>setLang('ta')}>🇮🇳 தமிழ்</button>
          </div>

          {/* Generate */}
          {tab!=='calendar'&&<button className="btn bp bfw" style={{fontSize:13,padding:10,marginBottom:10}}
            onClick={generate} disabled={generating||!bizName.trim()}>
            {generating?'⏳ Generating AI content…':
              tab==='instagram'?'✨ Generate Instagram Caption':
              tab==='facebook'?'✨ Generate Facebook Posts':
              tab==='youtube'?'✨ Generate YouTube Content':
              tab==='whatsapp'?'✨ Generate WhatsApp Messages':
              '✨ Generate Google Business Description'}
          </button>}
          {tab==='calendar'&&(
            <div>
              <div className="tig">
                <label>Content Calendar Days</label>
                <select className="tinp" value={calDays} onChange={e=>setCalDays(e.target.value)}>
                  <option value="7">7 Days (1 Week)</option>
                  <option value="14">14 Days (2 Weeks)</option>
                  <option value="30">30 Days (1 Month)</option>
                </select>
              </div>
              <button className="btn bp bfw" style={{fontSize:13,padding:10,marginBottom:10}}
                onClick={generateCalendar} disabled={calGenerating||!bizName.trim()}>
                {calGenerating?'⏳ Creating Calendar…':'📅 Generate Content Calendar'}
              </button>
            </div>
          )}

          {/* Quick hashtags */}
          {(tab==='instagram'||tab==='facebook')&&(
            <div style={{marginBottom:10}}>
              <div className="stitle">Ready-to-use Hashtags</div>
              <div className="tip" style={{fontSize:10,lineHeight:1.7,userSelect:'all',cursor:'text'}}>
                {IG_HASHTAGS[bizType]||DEFAULT_HASHTAGS}
              </div>
              <button className="btn bs bfw" style={{fontSize:11}} onClick={()=>{
                navigator.clipboard.writeText(IG_HASHTAGS[bizType]||DEFAULT_HASHTAGS);
                setCopied(true);setTimeout(()=>setCopied(false),2000);
              }}>{copied?'✅ Copied!':'📋 Copy Hashtags'}</button>
            </div>
          )}
        </div>
      </div>

      {/* Right: Result + Tips OR Automate Panel */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {tab==='automate'&&<AutomatePanel bizName={bizName} bizType={bizType} city={city}/>}
        {/* AI Result */}
        {tab!=='automate'&&<div style={{flex:1,overflow:'auto',padding:20}}>

          {/* ── Calendar Tab ── */}
          {tab==='calendar'&&(
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div className="stitle" style={{margin:0}}>📅 {calDays}-Day Content Calendar</div>
                {calResult&&<button className="btn bs" style={{fontSize:11}} onClick={()=>{navigator.clipboard.writeText(calResult);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>
                  {copied?'✅ Copied!':'📋 Copy All'}
                </button>}
              </div>
              {calGenerating&&<div style={{textAlign:'center',padding:40,color:'var(--muted)'}}><div style={{fontSize:40,marginBottom:12}}>📅</div><p>Creating your content calendar…</p></div>}
              {!calGenerating&&!calResult&&<div style={{textAlign:'center',padding:40,color:'var(--dim)'}}><div style={{fontSize:56,marginBottom:12}}>📅</div><p style={{color:'var(--muted)',fontSize:14}}>Enter your business name and click Generate</p><p style={{fontSize:11,marginTop:6}}>AI creates a full content plan with daily post ideas</p></div>}
              {!calGenerating&&calResult&&<textarea className="tinp" readOnly rows={30} value={calResult} style={{width:'100%',resize:'vertical',fontSize:12,lineHeight:1.8,fontFamily:'system-ui'}}/>}
            </div>
          )}

          {tab!=='calendar'&&<>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div className="stitle" style={{margin:0}}>
              {tab==='instagram'?'📸 Instagram Caption':''}
              {tab==='facebook'?'📘 Facebook Post':''}
              {tab==='youtube'?'▶️ YouTube Content':''}
              {tab==='whatsapp'?'💬 WhatsApp Messages':''}
              {tab==='google'?'🗺 Google Business Description':''}
            </div>
            <div style={{display:'flex',gap:6}}>
              {result&&!rewriting&&<button className="btn bs" style={{fontSize:11}} onClick={rewriteCaption}>✏️ Rewrite</button>}
              {rewriting&&<button className="btn bs" style={{fontSize:11}} disabled>⏳ Rewriting…</button>}
              {result&&<button className="btn bs" style={{fontSize:11}} onClick={copy}>{copied?'✅ Copied!':'📋 Copy'}</button>}
            </div>
          </div>
          {generating&&(
            <div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>
              <div style={{fontSize:40,marginBottom:12,animation:'spin 1.5s linear infinite'}}>✨</div>
              <p>AI is generating content for your business…</p>
              <p style={{fontSize:11,marginTop:6}}>Powered by AI · Free</p>
            </div>
          )}
          {!generating&&!result&&(
            <div style={{textAlign:'center',padding:40,color:'var(--dim)'}}>
              <div style={{fontSize:56,marginBottom:12}}>
                {tab==='instagram'?'📸':tab==='facebook'?'📘':tab==='youtube'?'▶️':tab==='whatsapp'?'💬':'🗺'}
              </div>
              <p style={{color:'var(--muted)',fontSize:14}}>Enter your business name and click Generate</p>
              <p style={{fontSize:11,marginTop:6}}>AI will create captions, hashtags & descriptions for you</p>
            </div>
          )}
          {!generating&&result&&(
            <textarea className="tinp" readOnly rows={14}
              value={result}
              style={{width:'100%',resize:'vertical',fontSize:13,lineHeight:1.7,fontFamily:'system-ui'}}/>
          )}

          {/* YouTube Thumbnail Generator */}
          {tab==='youtube'&&(
            <div style={{marginTop:16,padding:14,background:'var(--panel)',borderRadius:10,border:'1px solid var(--border)'}}>
              <div className="stitle" style={{marginBottom:8}}>🖼 YouTube Thumbnail Generator</div>
              <div className="tig">
                <label>Thumbnail Title Text (optional)</label>
                <input className="tinp" placeholder={`e.g. Best ${bizType} in ${city||'Tamil Nadu'}`}
                  value={thumbTitle} onChange={e=>setThumbTitle(e.target.value)}/>
              </div>
              <button className="btn bp bfw" style={{fontSize:12,marginBottom:10}}
                onClick={()=>generateThumb(0)} disabled={!bizName.trim()||thumbLoading}>
                🎨 Generate AI Thumbnail (Free)
              </button>
              {thumbLoading&&(
                <div style={{textAlign:'center',padding:16,color:'var(--muted)',fontSize:12,background:'var(--panel2)',borderRadius:8,border:'1px solid var(--border)'}}>
                  <div style={{fontSize:22,marginBottom:6}}>🎨</div>
                  {thumbRetry===0?'Generating thumbnail…':`Retrying… (attempt ${thumbRetry+1}/4)`}
                  <div style={{fontSize:11,marginTop:4,color:'var(--dim)'}}>This may take a few seconds</div>
                </div>
              )}
              {thumbError&&!thumbLoading&&(
                <div style={{padding:12,background:'#fef2f2',borderRadius:8,border:'1px solid #fecaca',fontSize:12,color:'#dc2626',textAlign:'center'}}>
                  ⚠️ Generation failed. Pollinations may be busy — please try again in 10 seconds.
                </div>
              )}
              {thumbUrl&&!thumbLoading&&!thumbError&&(
                <div>
                  <img src={thumbUrl}
                    style={{width:'100%',borderRadius:8,border:'1px solid var(--border)',display:'block'}}
                    onLoad={()=>setThumbLoading(false)}
                    onError={()=>{
                      if(thumbRetry<3){generateThumb(thumbRetry+1);}
                      else{setThumbLoading(false);setThumbError(true);setThumbUrl('');}
                    }}
                    alt="YouTube Thumbnail"/>
                  <div style={{display:'flex',gap:8,marginTop:8}}>
                    <button className="btn bs" style={{flex:1,fontSize:11}} onClick={()=>generateThumb(0)}>🔄 Regenerate</button>
                    <a href={thumbUrl} download="youtube-thumbnail.jpg" target="_blank"
                      className="btn bp" style={{flex:1,fontSize:11,textAlign:'center',textDecoration:'none',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                      ↓ Download
                    </a>
                  </div>
                  <div className="tip" style={{marginTop:8}}>Tip: Right-click → Save image if download doesn't work</div>
                </div>
              )}
            </div>
          )}

          {/* Tips */}
          <div style={{marginTop:20}}>
            <div className="stitle">
              {tab==='instagram'?'📈 Instagram Growth Tips for Tamil Nadu':
               tab==='facebook'?'📈 Facebook Growth Tips for Tamil Nadu':
               tab==='youtube'?'📈 YouTube Growth Tips for Tamil Nadu':
               tab==='whatsapp'?'📈 WhatsApp Business Tips for Tamil Nadu':
               '📈 Google Business Tips for Tamil Nadu'}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {tips.map((tip,i)=>(
                <div key={i} style={{display:'flex',gap:12,padding:'10px 12px',background:'var(--panel)',
                  borderRadius:8,border:'1px solid var(--border)'}}>
                  <span style={{fontSize:20,flexShrink:0}}>{tip.ic}</span>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:2}}>{tip.t}</div>
                    <div style={{fontSize:11,color:'var(--muted)'}}>{tip.d}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          </>}
        </div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════
function App(){
  const [mode,setMode]=useState('photo');
  return(
    <div className="app">
      <header className="hdr">
        <div className="logo">
          <div className="logo-ic"><svg viewBox="0 0 36 42" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="shg" x1="18" y1="0" x2="18" y2="42" gradientUnits="userSpaceOnUse"><stop stopColor="#3a8ab0"/><stop offset="1" stopColor="#4dd8c4"/></linearGradient></defs><path d="M18 2L3 9v13c0 10 6.5 16 15 19 8.5-3 15-9 15-19V9L18 2z" stroke="url(#shg)" strokeWidth="2.5" fill="none"/><path d="M18 8L8 13v8c0 7 4.5 11.5 10 14 5.5-2.5 10-7 10-14v-8L18 8z" stroke="url(#shg)" strokeWidth="1.5" fill="none" opacity="0.4"/><path d="M23 15c-1-1.5-3-2.5-5-2.5s-4 1.5-4 3.5 2 3 5 4 5 2.5 5 5-2 4-5 4.5-4.5-1-5.5-2.5" stroke="url(#shg)" strokeWidth="2.2" strokeLinecap="round" fill="none"/></svg></div>
          <div className="logo-wrap">
            <div className="logo-tx"><span className="ss">Smart Shield</span> <span className="one">One</span></div>
            <div className="logo-sub">Digital Marketing Platform</div>
          </div>
        </div>
        <div className="mode-tabs">
          <button className={`mt ${mode==='photo'?'on':''}`} onClick={()=>setMode('photo')}>🖼 Photo</button>
          <button className={`mt ${mode==='video'?'on':''}`} onClick={()=>setMode('video')}>🎬 Video</button>
          <button className={`mt ${mode==='audio'?'on':''}`} onClick={()=>setMode('audio')}>🎙 Audio / TTS</button>
          <button className={`mt ${mode==='ai'?'on':''}`} onClick={()=>setMode('ai')} style={{background:mode==='ai'?'linear-gradient(135deg,#2bb5a0,#38c9b0)':undefined}}>✨ AI Create</button>
          <button className={`mt ${mode==='grow'?'on':''}`} onClick={()=>setMode('grow')} style={{background:mode==='grow'?'linear-gradient(135deg,#22c55e,#16a34a)':undefined}}>📈 Grow</button>
        </div>
        <div className="badges">
          <span className="badge">Instagram</span>
          <span className="badge">Facebook</span>
          <span className="badge">YouTube</span>
          <span className="badge" style={{background:'rgba(249,115,22,.15)',color:'var(--orange)'}}>தமிழ்</span>
        </div>
      </header>
      <div className="layout">
        {mode==='photo'&&<PhotoEditor/>}
        {mode==='video'&&<VideoEditor/>}
        {mode==='audio'&&<AudioMode/>}
        {mode==='ai'&&<AIMode/>}
        {mode==='grow'&&<GrowMode/>}
      </div>
      <footer className="ftr">
        <div className="ftr-brand"><b>Smart Shield One</b> &middot; Digital Marketing Platform</div>
        <div className="ftr-links"><span>v1.0</span></div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
document.getElementById('boot')?.remove();
</script>
</body>
</html>
