<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Smart Shield One – Digital Marketing Platform</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Light main area */
  --bg:#eef2f8;--surface:#fff;--panel:#fff;--panel2:#f4f7fb;
  --border:#d8e0ec;--text:#0d1b2e;--muted:#5a6a82;--dim:#8fa0b8;
  /* Dark sidebar */
  --sidebar:#0d1829;--sidebar2:#172032;
  --sidebar-text:#dde8f8;--sidebar-muted:#7a8fac;--sidebar-dim:#3a5070;
  --sidebar-border:rgba(255,255,255,.08);
  /* Accent — indigo */
  --accent:#4f46e5;--accent-h:#6366f1;--accent-dim:rgba(79,70,229,.1);
  /* Status */
  --red:#ef4444;--green:#22c55e;--orange:#f97316;
  --r:12px;--rs:8px;
  --shadow:0 2px 8px rgba(0,0,0,.08),0 8px 24px rgba(0,0,0,.05);
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px;line-height:1.5}
.app{display:flex;flex-direction:column;height:100vh}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:62px;
  background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;
  box-shadow:0 1px 0 rgba(0,0,0,.05)}
.logo{display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo-wrap{display:flex;flex-direction:column;line-height:1.2}
.logo-ic{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(79,70,229,.4)}
.logo-ic svg{width:38px;height:42px;filter:drop-shadow(0 2px 6px rgba(255,255,255,.5));animation:logoPulse 3s ease-in-out infinite}
@keyframes logoPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.logo-tx{font-size:18px;font-weight:800;letter-spacing:-.4px;color:#0d1b2e}
.logo-tx .ss{background:linear-gradient(135deg,#4f46e5,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tx .one{color:#4f46e5;font-weight:800}
.logo-sub{font-size:10px;color:#7a8fac;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-top:2px}
.mode-tabs{display:flex;gap:3px;background:#f0f4fa;padding:4px;border-radius:11px;border:1px solid var(--border)}
.mt{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;
  color:#5a6a82;background:transparent;transition:all .2s;white-space:nowrap}
.mt:hover{color:#0d1b2e;background:#e4eaf4}
.mt.on{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;box-shadow:0 2px 10px rgba(79,70,229,.35)}
.badges{display:flex;gap:6px;flex-shrink:0}
.badge{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(79,70,229,.08);color:#4f46e5;border:1px solid rgba(79,70,229,.18)}

/* ── FOOTER ── */
.ftr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:30px;
  background:#fff;border-top:1px solid var(--border);flex-shrink:0;font-size:12px;color:var(--muted)}
.ftr-brand{color:var(--muted);font-weight:600;letter-spacing:.5px}
.ftr-brand b{color:var(--accent)}
.ftr-links{display:flex;gap:14px}
.ftr-links span{cursor:pointer;transition:color .15s}.ftr-links span:hover{color:var(--accent)}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}
.lpanel{width:295px;flex-shrink:0;background:var(--sidebar);
  border-right:1px solid rgba(0,0,0,.2);display:flex;flex-direction:column;overflow:hidden}
.ttabs{display:flex;border-bottom:1px solid var(--sidebar-border)}
.tt{flex:1;padding:12px 4px;border:none;background:transparent;color:var(--sidebar-muted);
  font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:4px;border-bottom:2px solid transparent;transition:all .2s}
.tt:hover{color:var(--sidebar-text);background:rgba(255,255,255,.04)}
.tt.on{color:#818cf8;border-bottom-color:#818cf8;background:rgba(129,140,248,.06)}
.tt .ic{font-size:16px}
.pbody{flex:1;overflow-y:auto;padding:14px}
.pbody::-webkit-scrollbar{width:4px}
.pbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* ── CANVAS / VIDEO AREAS ── */
.carea,.varea{flex:1;display:flex;align-items:center;justify-content:center;
  background:var(--bg);position:relative;overflow:hidden}
.varea{flex-direction:column;gap:14px}
.checker{background-image:linear-gradient(45deg,#dce4f0 25%,transparent 25%),
  linear-gradient(-45deg,#dce4f0 25%,transparent 25%),
  linear-gradient(45deg,transparent 75%,#dce4f0 75%),
  linear-gradient(-45deg,transparent 75%,#dce4f0 75%);
  background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0;
  position:absolute;inset:0}
.upzone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  width:360px;height:280px;border:2px dashed rgba(79,70,229,.3);border-radius:20px;
  cursor:pointer;transition:all .3s;position:relative;z-index:1;background:rgba(79,70,229,.04)}
.upzone:hover{border-color:var(--accent);background:rgba(79,70,229,.08);transform:scale(1.02);box-shadow:0 0 30px rgba(79,70,229,.15)}
.upzone .uic{font-size:48px}
.upzone p{font-size:16px;font-weight:600;color:var(--text)}
.upzone span{font-size:13px;color:var(--muted)}
.cwrap{position:relative;display:inline-block}
.ecanvas{max-width:calc(100vw - 310px);max-height:calc(100vh - 100px);display:block;
  border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.15),0 0 0 1px rgba(79,70,229,.1)}
.ctbar{position:absolute;bottom:-42px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.cbtn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:#fff;
  color:var(--muted);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;box-shadow:var(--shadow)}
.cbtn:hover{color:var(--text);border-color:var(--accent);background:#fff}
.vcont{position:relative;display:inline-block;z-index:1}
.evid{max-width:calc(100vw - 310px);max-height:calc(100vh - 200px);display:block;
  border-radius:var(--r);box-shadow:0 8px 40px rgba(0,0,0,.15)}
.vto{position:absolute;inset:0;pointer-events:none;border-radius:var(--r);overflow:hidden}
.vti{position:absolute;font-weight:bold;text-shadow:0 1px 4px rgba(0,0,0,.8);white-space:nowrap;user-select:none}
.vctrl{z-index:1;width:calc(100vw - 310px);max-width:740px;background:#fff;
  border-radius:var(--r);padding:14px 18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.prow{display:flex;align-items:center;gap:10px}
.playbtn{width:36px;height:36px;border-radius:50%;border:none;background:linear-gradient(135deg,#4f46e5,#7c3aed);
  color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(79,70,229,.4)}
.playbtn:hover{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.tdsp{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.pbwrap{flex:1;height:5px;background:var(--border);border-radius:3px;cursor:pointer}
.pbfill{height:100%;background:linear-gradient(90deg,#4f46e5,#7c3aed);border-radius:3px;pointer-events:none}
.tlbls{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px;font-variant-numeric:tabular-nums}

/* ── DARK SIDEBAR SHARED CONTROLS ── */
.stitle{font-size:10px;font-weight:700;color:var(--sidebar-muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:9px;margin-top:4px}
.sg{margin-bottom:12px}
.sl{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--sidebar-muted)}
.sl span:last-child{color:var(--sidebar-text);font-variant-numeric:tabular-nums;font-weight:500}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:rgba(255,255,255,.12);border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#818cf8;cursor:pointer;box-shadow:0 0 0 3px rgba(129,140,248,.25)}

/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 15px;
  border-radius:var(--rs);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.bp{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;box-shadow:0 2px 10px rgba(79,70,229,.35)}
.bp:hover{background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 4px 16px rgba(79,70,229,.45);transform:translateY(-1px)}
/* Secondary button — works on BOTH dark sidebar and white panels */
.bs{background:rgba(255,255,255,.1);color:var(--sidebar-text);border:1px solid rgba(255,255,255,.14)}
.bs:hover{border-color:#818cf8;color:#a5b4fc;background:rgba(129,140,248,.15)}
.bd{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.22)}
.bd:hover{background:rgba(239,68,68,.22)}
.bg2{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.2)}
.bg2:hover{background:rgba(249,115,22,.2)}
.bfw{width:100%}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.div{height:1px;background:rgba(255,255,255,.07);margin:13px 0}
.tip{font-size:12px;color:var(--sidebar-muted);padding:9px 11px;
  background:rgba(129,140,248,.07);border-radius:var(--rs);
  border-left:3px solid rgba(129,140,248,.45);margin-bottom:12px;line-height:1.5}
.es{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 0;color:var(--sidebar-muted)}
.es .ei{font-size:28px;margin-bottom:4px}
.es p{font-size:13px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}

/* ── INPUTS (dark sidebar context) ── */
.tig{margin-bottom:11px}
.tig label{display:block;font-size:11px;color:var(--sidebar-muted);margin-bottom:5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.tinp{width:100%;padding:9px 11px;border-radius:var(--rs);
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.06);color:var(--sidebar-text);
  font-size:13px;outline:none;transition:border-color .15s,background .15s;font-family:inherit}
.tinp::placeholder{color:var(--sidebar-dim)}
.tinp:focus{border-color:#818cf8;background:rgba(255,255,255,.1)}
textarea.tinp{resize:vertical;min-height:78px;line-height:1.6}
select.tinp option{background:#0d1829;color:#dde8f8}

/* ── OVERRIDES for white Create AI panel ── */
.ai-side .stitle{color:var(--muted);font-size:10px}
.ai-side .tig label{color:var(--muted);text-transform:uppercase;font-size:11px}
.ai-side .tinp{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.ai-side .tinp::placeholder{color:var(--dim)}
.ai-side .tinp:focus{border-color:var(--accent);background:#fff}
.ai-side .bs{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.ai-side .bs:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.ai-side .sl{color:var(--muted)}
.ai-side .sl span:last-child{color:var(--text)}
.ai-side select.tinp option{background:#fff;color:var(--text)}

/* ── FILTERS ── */
.fpresets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.fp{padding:5px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  color:var(--sidebar-muted);font-size:12px;cursor:pointer;transition:all .15s}
.fp:hover,.fp.on{border-color:#818cf8;color:#a5b4fc;background:rgba(129,140,248,.14)}
.rrow{display:flex;gap:7px;margin-bottom:14px}
.rrow .btn{flex:1;font-size:12px;padding:7px}

/* ── COLOR PICKER ── */
.crow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.csw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.csw:hover,.csw.on{border-color:#fff;transform:scale(1.2)}
.ccc{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.2);cursor:pointer;overflow:hidden;padding:0}
.ccc input{width:200%;height:200%;margin:-50%;cursor:pointer;border:none}

/* ── TOGGLE ── */
.trow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tl{font-size:13px;color:var(--sidebar-muted)}
.tog{position:relative;width:36px;height:20px;cursor:pointer}
.tog input{opacity:0;width:0;height:0}
.togs{position:absolute;inset:0;background:rgba(255,255,255,.12);border-radius:10px;transition:.2s}
.togs:before{content:'';position:absolute;width:13px;height:13px;left:3.5px;bottom:3.5px;background:#fff;border-radius:50%;transition:.2s}
.tog input:checked + .togs{background:#818cf8}
.tog input:checked + .togs:before{transform:translateX(16px)}

/* ── TEXT ITEMS ── */
.tlist{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.ti{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;
  background:rgba(255,255,255,.05);border-radius:var(--rs);border:1px solid rgba(255,255,255,.08)}
.tilb{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--sidebar-text)}
.tidl{width:22px;height:22px;border-radius:5px;border:none;background:transparent;
  color:var(--sidebar-muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.tidl:hover{color:#f87171;background:rgba(239,68,68,.12)}

/* ── TEMPLATES ── */
.tpl-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tpl-cat{padding:4px 11px;border-radius:20px;font-size:12px;cursor:pointer;
  border:1px solid rgba(255,255,255,.1);color:var(--sidebar-muted);background:transparent;transition:all .15s}
.tpl-cat.on{background:#818cf8;color:#fff;border-color:#818cf8}
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tpl-card{border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .15s}
.tpl-card:hover{border-color:#818cf8;transform:translateY(-2px)}
.tpl-thumb{height:78px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;text-align:center;padding:7px;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.tpl-name{font-size:12px;padding:5px 7px;background:rgba(255,255,255,.05);color:var(--sidebar-text);font-weight:600}
.tpl-size{font-size:11px;padding:0 7px 5px;background:rgba(255,255,255,.05);color:var(--sidebar-muted)}
.vid-tpl-card{display:flex;align-items:center;gap:12px;padding:10px 12px;background:rgba(255,255,255,.05);border-radius:10px;cursor:pointer;border:2px solid transparent;margin-bottom:7px;transition:all .15s}
.vid-tpl-card:hover{border-color:#818cf8}
.vid-tpl-icon{font-size:24px;flex-shrink:0}
.vid-tpl-name{font-size:14px;font-weight:600;color:var(--sidebar-text)}
.vid-tpl-desc{font-size:12px;color:var(--sidebar-muted);margin-top:2px}

/* ── EXPORT ── */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.pc{padding:10px 7px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.05);
  cursor:pointer;transition:all .15s;text-align:center}
.pc:hover{border-color:#818cf8}
.pc.on{border-color:#818cf8;background:rgba(129,140,248,.14)}
.pc .pi{font-size:18px;margin-bottom:3px}
.pc .pn{font-size:12px;font-weight:600;color:var(--sidebar-text)}
.pc .ps{font-size:11px;color:var(--sidebar-muted);margin-top:2px}
.frow{display:flex;gap:7px;margin-bottom:12px}
.fb{flex:1;padding:7px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.05);
  color:var(--sidebar-muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.fb.on{border-color:#818cf8;color:#a5b4fc;background:rgba(129,140,248,.14)}

/* ── TAMIL KEYBOARD ── */
.tamil-kb-wrap{margin-top:10px;background:rgba(255,255,255,.04);
  border:1px solid var(--sidebar-border);border-radius:var(--rs);overflow:hidden}
.tamil-kb-header{display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;border-bottom:1px solid var(--sidebar-border);background:rgba(255,255,255,.03)}
.tamil-kb-header span{font-size:11px;font-weight:600;color:#a5b4fc}
.tamil-section{padding:8px 8px 0}
.tamil-section-label{font-size:9px;color:var(--sidebar-dim);font-weight:700;text-transform:uppercase;margin-bottom:5px;letter-spacing:.8px}
.tamil-chars{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.tchar{min-width:28px;height:28px;border-radius:4px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.06);color:var(--sidebar-text);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:'Noto Sans Tamil',system-ui}
.tchar:hover{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.1)}
.tchar.mark{font-size:18px;min-width:32px}
.tamil-actions{display:flex;gap:5px;padding:6px 8px;border-top:1px solid var(--sidebar-border)}

/* ── PHONETIC PANEL ── */
.phonetic-wrap{margin-top:10px;background:rgba(255,255,255,.04);border:1px solid var(--sidebar-border);border-radius:var(--rs);overflow:hidden}
.phonetic-header{padding:7px 10px;border-bottom:1px solid var(--sidebar-border);background:rgba(255,255,255,.03);
  display:flex;align-items:center;justify-content:space-between}
.phonetic-header span{font-size:11px;font-weight:600;color:#fb923c}
.phonetic-body{padding:9px}
.phonetic-out{width:100%;padding:8px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.06);color:#a5b4fc;font-size:18px;min-height:48px;word-break:break-all;
  font-family:'Noto Sans Tamil',system-ui;line-height:1.4}

/* ── AUDIO MODE ── */
.audio-area{flex:1;display:flex;align-items:center;justify-content:center;
  background:var(--bg);position:relative;overflow:hidden}
.audio-main{width:100%;max-width:540px;display:flex;flex-direction:column;gap:14px;z-index:1;padding:20px}
.lang-tabs{display:flex;gap:4px;margin-bottom:11px}
.lang-tab{flex:1;padding:7px;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--panel2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.lang-tab.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Sidebar lang tabs need different colors */
.lpanel .lang-tab{border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:var(--sidebar-muted)}
.lpanel .lang-tab.on{border-color:#818cf8;color:#a5b4fc;background:rgba(129,140,248,.15)}

/* ── VOICE RECORDER ── */
.rec-display{display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:24px;background:var(--panel2);border-radius:12px;border:1px solid var(--border)}
.rec-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:28px;cursor:pointer;transition:all .2s;border:3px solid var(--border)}
.rec-circle.idle{background:var(--panel);border-color:var(--border)}
.rec-circle.recording{background:rgba(239,68,68,.15);border-color:var(--red);animation:pulse 1.2s infinite}
.rec-circle.done{background:var(--accent-dim);border-color:var(--accent)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

/* ── CREATE AI PANEL ── */
.ai-wrap{display:flex;flex:1;overflow:hidden}
.ai-side{width:310px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto}
.ai-side::-webkit-scrollbar{width:3px}
.ai-side::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.ai-stage{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.ai-spinner{font-size:52px;animation:spin 1.5s linear infinite}
.ai-result-img{max-width:100%;max-height:80vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.ai-result-vid{max-width:100%;max-height:75vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.2)}

.voice-btn.listening{background:var(--red);animation:pulse 1.2s infinite}
.ai-token-help{font-size:11px;color:var(--muted);line-height:1.6;padding:10px 12px;
  background:var(--panel2);border-radius:8px;margin-top:10px;border:1px solid var(--border)}
.ai-token-help b{color:var(--text)}
.sample-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.sample-pill{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s;text-align:left;font-weight:500}
.sample-pill:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.rec-time{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text)}
.rec-status{font-size:12px;color:var(--muted)}
.waveform{width:100%;height:36px;background:var(--panel);border-radius:6px;overflow:hidden;position:relative}
.waveform-inner{height:100%;display:flex;align-items:center;gap:2px;padding:0 8px;background:var(--accent-dim)}

.voice-controls{background:var(--panel2);border-radius:var(--rs);border:1px solid var(--border);overflow:hidden}
.vc-section{padding:11px}

/* ── OVERLAY ── */

  justify-content:center;z-index:100;flex-direction:column;gap:10px}

<body>
<!-- Loading screen — shown while Babel compiles the app -->
<div id="boot" style="position:fixed;inset:0;background:#0d0d0d;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;z-index:9999">

<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════
// TAMIL TRANSLITERATION ENGINE  (Azhagi-style smart phonetic)
// ═══════════════════════════════════════════════════════
const CONS_MAP = [
  // ── 4-char clusters ──
  ['thth','த்த'],['chch','ச்ச'],['shsh','ஷ்ஷ'],['zhzh','ழ்ழ'],
  // ── 3-char clusters ──
  ['nng','ண'],['nch','ஞ்ச'],['nth','ந்த'],['ndh','ந்த'],
  ['kkh','க்க'],['pph','ப்ப'],
  // ── 2-char nasal+stop (auto-assimilation) ──
  ['nj','ஞ'],['ng','ங'],
  ['nk','ங்க'],['nc','ஞ்ச'],
  ['nT','ண்ட'],['nD','ண்ட'],
  ['nd','ந்த'],['nt','ந்த'],
  ['mp','ம்ப'],['mb','ம்ப'],
  // ── 2-char geminates ──
  ['kk','க்க'],['gg','க்க'],
  ['cc','ச்ச'],['jj','ஜ்ஜ'],
  ['TT','ட்ட'],['DD','ட்ட'],['tt','த்த'],
  ['pp','ப்ப'],['bb','ப்ப'],
  ['mm','ம்ம'],['nn','ன்ன'],['NN','ண்ண'],
  ['yy','ய்ய'],['rr','ற்ற'],['RR','ற்ற'],
  ['ll','ல்ல'],['LL','ள்ள'],
  ['vv','வ்வ'],['ww','வ்வ'],
  ['ss','ஸ்ஸ'],['hh','ஹ்ஹ'],
  // ── 2-char special clusters ──
  ['tr','ற்ற'],['dr','ற்ற'],
  // ── 2-char digraphs ──
  ['zh','ழ'],['sh','ஷ'],['ch','ச'],
  ['th','த'],['dh','த'],['gh','க'],['kh','க'],['ph','ப'],
  // ── Singles ──
  ['k','க'],['g','க'],['c','ச'],['j','ஜ'],
  ['T','ட'],['D','ட'],['N','ண'],['t','த'],
  ['n','ந'],['p','ப'],['b','ப'],['m','ம'],['f','ப'],
  ['y','ய'],['r','ர'],['l','ல'],['v','வ'],['w','வ'],
  ['L','ள'],['R','ற'],['s','ஸ'],['h','ஹ'],
  ['z','ஜ'],['q','க'],
];
const VOWMARK = [
  ['aa','ா'],['A','ா'],['ii','ீ'],['I','ீ'],['uu','ூ'],['U','ூ'],
  ['ee','ே'],['E','ே'],['oo','ோ'],['O','ோ'],
  ['ai','ை'],['au','ௌ'],['ow','ௌ'],
  ['a',''],['i','ி'],['u','ு'],['e','ெ'],['o','ொ'],
];
const SVOWEL = [
  ['aa','ஆ'],['A','ஆ'],['ii','ஈ'],['I','ஈ'],['uu','ஊ'],['U','ஊ'],
  ['ee','ஏ'],['E','ஏ'],['oo','ஓ'],['O','ஓ'],
  ['ai','ஐ'],['au','ஔ'],['ow','ஔ'],
  ['a','அ'],['i','இ'],['u','உ'],['e','எ'],['o','ஒ'],
];

const TAMIL_MAP = (() => {
  const m = {};
  SVOWEL.forEach(([r,t])=>{ m[r]=t; });
  CONS_MAP.forEach(([rc,tc])=>{
    VOWMARK.forEach(([rv,tv])=>{ m[rc+rv]=tc+tv; });
    m[rc]=tc+'்';
  });
  m['H']='ஃ'; // Aytham
  return m;
})();
const TAMIL_PATTERNS = Object.keys(TAMIL_MAP).sort((a,b)=>b.length-a.length);

function transliterate(text) {
  let out='', i=0;
  while(i<text.length){
    if(text[i]===' '||text[i]==='\n'){out+=text[i];i++;continue;}
    let found=false;
    for(const p of TAMIL_PATTERNS){
      if(text.slice(i).startsWith(p)){out+=TAMIL_MAP[p];i+=p.length;found=true;break;}
    }
    if(!found){out+=text[i];i++;}
  }
  return out;
}

// ═══════════════════════════════════════════════════════
// TAMIL KEYBOARD COMPONENT
// ═══════════════════════════════════════════════════════
const TA_VOWELS  = ['அ','ஆ','இ','ஈ','உ','ஊ','எ','ஏ','ஐ','ஒ','ஓ','ஔ','ஃ'];
const TA_CONS    = ['க','ங','ச','ஞ','ட','ண','த','ந','ப','ம','ய','ர','ல','வ','ழ','ள','ற','ன','ஜ','ஷ','ஸ','ஹ'];
const TA_MARKS   = ['ா','ி','ீ','ு','ூ','ெ','ே','ை','ொ','ோ','ௌ','்','ஂ'];
const TA_NUMS    = ['௦','௧','௨','௩','௪','௫','௬','௭','௮','௯'];
const TA_SPECIAL = ['।','॥','ஸ்ரீ'];

function TamilKeyboard({ onInsert, onBackspace, onSpace }) {
  return (
    <div className="tamil-kb-wrap">
      <div className="tamil-kb-header">
        <span>🇮🇳 Tamil Keyboard</span>
        <span style={{fontSize:9,color:'var(--muted)'}}>Click to insert</span>
      </div>
      <div className="tamil-section">
        <div className="tamil-section-label">Vowels · உயிர்</div>
        <div className="tamil-chars">
          {TA_VOWELS.map(c=><button key={c} className="tchar" onClick={()=>onInsert(c)}>{c}</button>)}
        </div>
        <div className="tamil-section-label">Consonants · மெய்</div>
        <div className="tamil-chars">
          {TA_CONS.map(c=><button key={c} className="tchar" onClick={()=>onInsert(c)}>{c}</button>)}
        </div>
        <div className="tamil-section-label">Vowel Signs · உயிர்மெய்</div>
        <div className="tamil-chars">
          {TA_MARKS.map(c=><button key={c} className="tchar mark" onClick={()=>onInsert(c)}>{c}</button>)}
        </div>
        <div className="tamil-section-label">Numbers · எண்கள்</div>
        <div className="tamil-chars">
          {TA_NUMS.map(c=><button key={c} className="tchar" onClick={()=>onInsert(c)}>{c}</button>)}
          {TA_SPECIAL.map(c=><button key={c} className="tchar" style={{minWidth:36,fontSize:12}} onClick={()=>onInsert(c)}>{c}</button>)}
        </div>
      </div>
      <div className="tamil-actions">
        <button className="btn bs" style={{flex:1,fontSize:11}} onClick={onSpace}>Space</button>
        <button className="btn bd" style={{flex:1,fontSize:11}} onClick={onBackspace}>⌫ Delete</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// FILTER PANEL
// ═══════════════════════════════════════════════════════
const PREF = [
  {name:'Normal', f:{brightness:100,contrast:100,saturation:100,hue:0,blur:0,sepia:0}},
  {name:'Vivid',  f:{brightness:106,contrast:120,saturation:140,hue:0,blur:0,sepia:0}},
  {name:'Matte',  f:{brightness:95,contrast:85,saturation:70,hue:0,blur:0,sepia:8}},
  {name:'B&W',    f:{brightness:100,contrast:110,saturation:0,hue:0,blur:0,sepia:0}},
  {name:'Warm',   f:{brightness:106,contrast:100,saturation:110,hue:18,blur:0,sepia:20}},
  {name:'Cool',   f:{brightness:100,contrast:106,saturation:90,hue:-18,blur:0,sepia:0}},
  {name:'Vintage',f:{brightness:95,contrast:90,saturation:80,hue:10,blur:0,sepia:40}},
  {name:'Fade',   f:{brightness:112,contrast:78,saturation:72,hue:0,blur:0,sepia:5}},
];
const SLIDERS=[
  {key:'brightness',label:'Brightness',min:0,max:200,u:'%'},
  {key:'contrast',label:'Contrast',min:0,max:200,u:'%'},
  {key:'saturation',label:'Saturation',min:0,max:200,u:'%'},
  {key:'hue',label:'Hue Rotate',min:-180,max:180,u:'°'},
  {key:'blur',label:'Blur',min:0,max:20,u:'px'},
  {key:'sepia',label:'Sepia',min:0,max:100,u:'%'},
];
function FilterPanel({filters,onChange,rotation,onRotate}){
  const active=PREF.find(p=>Object.entries(p.f).every(([k,v])=>filters[k]===v));
  return(
    <div className="pbody">
      <div className="stitle">Presets</div>
      <div className="fpresets">{PREF.map(p=><button key={p.name} className={`fp ${active?.name===p.name?'on':''}`} onClick={()=>onChange({...p.f})}>{p.name}</button>)}</div>
      <div className="div"/>
      <div className="stitle">Adjustments</div>
      {SLIDERS.map(s=>(
        <div className="sg" key={s.key}>
          <div className="sl"><span>{s.label}</span><span>{filters[s.key]}{s.u}</span></div>
          <input type="range" min={s.min} max={s.max} value={filters[s.key]} onChange={e=>onChange({...filters,[s.key]:+e.target.value})}/>
        </div>
      ))}
      <div className="div"/>
      <div className="stitle">Transform</div>
      <div className="sg">
        <div className="sl"><span>Rotation</span><span>{rotation}°</span></div>
        <input type="range" min={-180} max={180} value={rotation} onChange={e=>onRotate(+e.target.value)}/>
      </div>
      <div className="rrow">
        <button className="btn bs" onClick={()=>onRotate(r=>r-90)}>↺ -90°</button>
        <button className="btn bs" onClick={()=>onRotate(r=>r+90)}>↻ +90°</button>
        <button className="btn bs" onClick={()=>onRotate(r=>-r)}>Flip</button>
      </div>
      <button className="btn bs bfw" onClick={()=>{onChange(PREF[0].f);onRotate(0);}}>Reset All</button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// TEXT PANEL (with Tamil keyboard)
// ═══════════════════════════════════════════════════════
const COLORS=['#ffffff','#000000','#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#38c9b0','#ec4899'];
const FONTS=['system-ui','Arial','Georgia','Courier New','Impact','Trebuchet MS','Verdana'];
const DEF_T={text:'',size:52,font:'system-ui',color:'#ffffff',bold:true,shadow:true,opacity:1};

function TextPanel({texts,onChange,canvasW,canvasH}){
  const [form,setForm]=useState(DEF_T);
  const [mode,setMode]=useState('phonetic'); // 'direct' | 'phonetic' | 'keyboard'
  const [committed,setCommitted]=useState('');
  const [rawBuf,setRawBuf]=useState('');
  const inputRef=useRef(null);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));

  // Sync phonetic IME value → form.text
  useEffect(()=>{
    if(mode==='phonetic') upd('text', committed+transliterate(rawBuf));
  },[committed,rawBuf]);

  const switchMode=(m)=>{
    if(m==='phonetic'){
      // carry over existing text as committed
      setCommitted(form.text); setRawBuf('');
    } else {
      // commit buffer before switching
      if(rawBuf) setForm(f=>({...f,text:committed+transliterate(rawBuf)}));
    }
    setMode(m);
  };

  const insertAtCursor=(char)=>{
    const el=inputRef.current;
    if(!el){setForm(f=>({...f,text:f.text+char}));return;}
    const s=el.selectionStart,e=el.selectionEnd;
    const nv=form.text.slice(0,s)+char+form.text.slice(e);
    setForm(f=>({...f,text:nv}));
    setTimeout(()=>{el.focus();el.setSelectionRange(s+char.length,s+char.length)},0);
  };
  const backspaceKB=()=>{
    const el=inputRef.current; if(!el)return;
    const s=el.selectionStart; if(s===0)return;
    setForm(f=>({...f,text:f.text.slice(0,s-1)+f.text.slice(s)}));
    setTimeout(()=>{el.focus();el.setSelectionRange(s-1,s-1)},0);
  };

  // Real-time Tamil IME keydown handler
  const imeKeyDown=(e)=>{
    if(mode!=='phonetic') { if(e.key==='Enter') add(); return; }
    if(e.metaKey||e.ctrlKey) return;
    e.preventDefault();
    if(e.key==='Backspace'){
      if(rawBuf.length>0) setRawBuf(b=>b.slice(0,-1));
      else setCommitted(c=>[...c].slice(0,-1).join(''));
    } else if(e.key===' '){
      setCommitted(c=>c+transliterate(rawBuf)+' '); setRawBuf('');
    } else if(e.key==='Enter'){
      setCommitted(c=>c+transliterate(rawBuf)); setRawBuf(''); add();
    } else if(e.key.length===1){
      setRawBuf(b=>b+e.key);
    }
  };

  const add=()=>{
    const txt=(mode==='phonetic'?(committed+transliterate(rawBuf)):form.text).trim();
    if(!txt)return;
    const cx=canvasW?Math.floor(canvasW/2):200;
    const cy=canvasH?Math.floor(canvasH/2):200;
    onChange([...texts,{...form,text:txt,x:cx,y:cy,id:Date.now()}]);
    setForm({...DEF_T}); setCommitted(''); setRawBuf('');
  };

  const displayVal = mode==='phonetic' ? (committed+transliterate(rawBuf)) : form.text;

  return(
    <div className="pbody">
      {/* Input mode toggles */}
      <div style={{display:'flex',gap:5,marginBottom:9}}>
        <button className={`btn ${mode==='direct'?'bp':'bs'}`} style={{flex:1,fontSize:10}} onClick={()=>switchMode('direct')}>EN</button>
        <button className={`btn ${mode==='keyboard'?'bp':'bs'}`} style={{flex:1,fontSize:10}} onClick={()=>switchMode('keyboard')}>TA கீபோர்டு</button>
        <button className={`btn ${mode==='phonetic'?'bp':'bs'}`} style={{flex:1,fontSize:10}} onClick={()=>switchMode('phonetic')}>TA Phonetic</button>
      </div>

      <div className="tig">
        <label>
          Text Content
          {mode==='phonetic'&&rawBuf&&<span style={{float:'right',fontSize:10,color:'var(--orange)'}}>typing: {rawBuf}</span>}
        </label>
        <input ref={inputRef} className="tinp"
          placeholder={mode==='phonetic'?'Type English → Tamil auto: vaNakkam=வணக்கம்  nandRi=நன்றி  thamizh=தமிழ்':mode==='keyboard'?'Use keyboard below…':'Enter text…'}
          value={displayVal}
          onChange={mode==='direct'?e=>upd('text',e.target.value):()=>{}}
          onKeyDown={imeKeyDown}
          style={mode==='phonetic'?{fontFamily:"'Noto Sans Tamil',system-ui",fontSize:16}:{}}
        />
      </div>

      {/* Tamil Virtual Keyboard */}
      {mode==='keyboard' && <TamilKeyboard onInsert={insertAtCursor} onBackspace={backspaceKB} onSpace={()=>insertAtCursor(' ')}/>}

      {/* Phonetic hint */}
      {mode==='phonetic' && (
        <div className="tip" style={{marginBottom:9}}>
          <b>Smart Tamil Phonetic:</b> va→வ · ka→க · tha→த · zha→ழ · aa→ஆ · kka→க்க · ppa→ப்ப · lla→ல்ல · rra/tra→ற்ற · nka→ங்க · nda→ந்த · mba→ம்ப · N→ண · L→ள · R→ற<br/>
          <span style={{color:'var(--muted)'}}>Space = next word · Backspace = delete · H = ஃ</span>
        </div>
      )}

      <div className="div"/>
      <div className="r2">
        <div className="tig">
          <label>Font</label>
          <select className="tinp" value={form.font} onChange={e=>upd('font',e.target.value)}>
            {FONTS.map(f=><option key={f} value={f}>{f}</option>)}
          </select>
        </div>
        <div className="tig">
          <label>Size (px)</label>
          <input className="tinp" type="number" min={8} max={400} value={form.size} onChange={e=>upd('size',+e.target.value)}/>
        </div>
      </div>
      <div className="tig"><label>Color</label>
        <div className="crow">
          {COLORS.map(c=><div key={c} className={`csw ${form.color===c?'on':''}`}
            style={{background:c,border:c==='#ffffff'?'2px solid #444':undefined}} onClick={()=>upd('color',c)}/>)}
          <label className="ccc"><input type="color" value={form.color} onChange={e=>upd('color',e.target.value)}/></label>
        </div>
      </div>
      <div className="sg">
        <div className="sl"><span>Opacity</span><span>{Math.round(form.opacity*100)}%</span></div>
        <input type="range" min={0.1} max={1} step={0.05} value={form.opacity} onChange={e=>upd('opacity',+e.target.value)}/>
      </div>
      <div className="r2" style={{marginBottom:9}}>
        <div className="trow">
          <span className="tl">Bold</span>
          <label className="tog"><input type="checkbox" checked={form.bold} onChange={e=>upd('bold',e.target.checked)}/><span className="togs"/></label>
        </div>
        <div className="trow">
          <span className="tl">Shadow</span>
          <label className="tog"><input type="checkbox" checked={form.shadow} onChange={e=>upd('shadow',e.target.checked)}/><span className="togs"/></label>
        </div>
      </div>
      <button className="btn bp bfw" onClick={add} disabled={!displayVal.trim()}>+ Add Text</button>
      {texts.length>0&&<>
        <div className="div"/>
        <div className="stitle">Added ({texts.length})</div>
        <div className="tlist">
          {texts.map(t=>(
            <div key={t.id} className="ti">
              <span className="tilb" style={{fontFamily:t.font,color:t.color}}>{t.text}</span>
              <button className="tidl" onClick={()=>onChange(texts.filter(x=>x.id!==t.id))}>✕</button>
            </div>
          ))}
        </div>
        <div style={{marginTop:9}}><button className="btn bd bfw" onClick={()=>onChange([])}>Clear All</button></div>
      </>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// EXPORT PANEL
// ═══════════════════════════════════════════════════════
const PRESETS_E=[
  {id:'ig_sq',label:'Instagram Post',icon:'📷',w:1080,h:1080,desc:'1:1 Square'},
  {id:'ig_pt',label:'Instagram Portrait',icon:'📷',w:1080,h:1350,desc:'4:5 Portrait'},
  {id:'ig_st',label:'Instagram Story',icon:'📱',w:1080,h:1920,desc:'9:16 Story'},
  {id:'fb_ps',label:'Facebook Post',icon:'📘',w:1200,h:630,desc:'1.91:1'},
  {id:'fb_st',label:'Facebook Story',icon:'📘',w:1080,h:1920,desc:'9:16 Story'},
  {id:'yt_th',label:'YouTube Thumbnail',icon:'▶️',w:1280,h:720,desc:'16:9'},
  {id:'yt_sh',label:'YouTube Shorts',icon:'▶️',w:1080,h:1920,desc:'9:16'},
  {id:'orig', label:'Original Size',icon:'🖼️',w:null,h:null,desc:'Keep original'},
];
function ExportPanel({onExport,hasImage,isVideo}){
  const [sel,setSel]=useState('ig_sq');
  const [fmt,setFmt]=useState('JPG');
  const preset=PRESETS_E.find(p=>p.id===sel);
  return(
    <div className="pbody">
      <div className="stitle">Platform Preset</div>
      <div className="pgrid">
        {PRESETS_E.map(p=>(
          <div key={p.id} className={`pc ${sel===p.id?'on':''}`} onClick={()=>setSel(p.id)}>
            <div className="pi">{p.icon}</div>
            <div className="pn">{p.label}</div>
            <div className="ps">{p.desc}</div>
            {p.w&&<div className="ps">{p.w}×{p.h}</div>}

        ))}
      </div>
      {!isVideo&&<>
        <div className="stitle" style={{marginBottom:7}}>Format</div>
        <div className="frow">
          {['JPG','PNG','WEBP'].map(f=><button key={f} className={`fb ${fmt===f?'on':''}`} onClick={()=>setFmt(f)}>{f}</button>)}
        </div>
      </>}
      {preset.w&&<div className="tip">Output: {preset.w}×{preset.h}px ({preset.desc})</div>}

        style={{fontSize:13,padding:'9px 14px'}}>
        ↓ Download {isVideo?'Video':fmt}
      </button>
      {!hasImage&&<div className="es" style={{marginTop:12}}><div className="ei">⬆️</div><p>Upload a file first</p></div>}
    </div>
  );
}

// PHOTO EDITOR
// ═══════════════════════════════════════════════════════
const DEF_F={brightness:100,contrast:100,saturation:100,hue:0,blur:0,sepia:0};
function PhotoEditor(){
  const canvasRef=useRef(null);
  const imgRef=useRef(null);
  const [image,setImage]=useState(null);
  const [filters,setFilters]=useState(DEF_F);
  const [texts,setTexts]=useState([]);
  const [rot,setRot]=useState(0);
  const [tab,setTab]=useState('filters');

  const render=useCallback(()=>{
    const c=canvasRef.current,img=imgRef.current;
    if(!c||!img)return;
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    ctx.save();
    ctx.translate(c.width/2,c.height/2);
    ctx.rotate(rot*Math.PI/180);
    ctx.translate(-c.width/2,-c.height/2);
    ctx.filter=[`brightness(${filters.brightness}%)`,`contrast(${filters.contrast}%)`,
      `saturate(${filters.saturation}%)`,`hue-rotate(${filters.hue}deg)`,
      `blur(${filters.blur}px)`,`sepia(${filters.sepia}%)`].join(' ');
    ctx.drawImage(img,0,0,c.width,c.height);
    ctx.restore();
    texts.forEach(t=>{
      ctx.save();
      ctx.font=`${t.bold?'bold ':''} ${t.size}px "${t.font}", sans-serif`;
      ctx.fillStyle=t.color;ctx.globalAlpha=t.opacity;
      if(t.shadow){ctx.shadowColor='rgba(0,0,0,.75)';ctx.shadowBlur=6;ctx.shadowOffsetX=2;ctx.shadowOffsetY=2;}
      ctx.fillText(t.text,t.x,t.y);
      ctx.restore();
    });
  },[filters,texts,rot]);

  useEffect(()=>{render();},[render]);

  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      imgRef.current=img;
      const c=canvasRef.current;
      let w=img.naturalWidth,h=img.naturalHeight;
      if(w>1200){h=Math.round(h*1200/w);w=1200;}
      if(h>1200){w=Math.round(w*1200/h);h=1200;}
      c.width=w;c.height=h;setImage(img);
    };
    img.src=url;
  };

  const doExport=(preset,fmt)=>{
    const src=canvasRef.current;if(!src)return;
    let out=src;
    if(preset.w&&preset.h){out=document.createElement('canvas');out.width=preset.w;out.height=preset.h;out.getContext('2d').drawImage(src,0,0,preset.w,preset.h);}
    const mime=fmt==='png'?'image/png':fmt==='webp'?'image/webp':'image/jpeg';
    const a=document.createElement('a');a.download=`editpro.${fmt}`;a.href=out.toDataURL(mime,0.92);a.click();
  };

  const [tplCat,setTplCat]=useState('All');
  const PHOTO_TPLS=[
    {id:'ig_post',name:'Instagram Post',cat:'Social',w:1080,h:1080,bg:'linear-gradient(135deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%)',label:'1:1'},
    {id:'ig_story',name:'IG Story',cat:'Social',w:1080,h:1920,bg:'linear-gradient(180deg,#4158D0 0%,#C850C0 50%,#FFCC70 100%)',label:'Story'},
    {id:'yt_thumb',name:'YT Thumbnail',cat:'YouTube',w:1280,h:720,bg:'linear-gradient(135deg,#cc0000 0%,#8B0000 100%)',label:'16:9'},
    {id:'fb_cover',name:'FB Cover',cat:'Social',w:1200,h:630,bg:'linear-gradient(135deg,#1877f2 0%,#0d47a1 100%)',label:'Cover'},
    {id:'wa_status',name:'WA Status',cat:'Social',w:1080,h:1920,bg:'linear-gradient(180deg,#25D366 0%,#128C7E 100%)',label:'WA'},
    {id:'biz_promo',name:'Business Promo',cat:'Business',w:1080,h:1080,bg:'linear-gradient(135deg,#0f2535 0%,#0f3460 100%)',label:'Biz'},
    {id:'sale',name:'Sale Offer',cat:'Business',w:1080,h:1080,bg:'linear-gradient(135deg,#f7971e 0%,#ffd200 100%)',label:'Sale'},
    {id:'event',name:'Event Poster',cat:'Business',w:1080,h:1350,bg:'linear-gradient(135deg,#2d1b69 0%,#11998e 100%)',label:'4:5'},
    {id:'birthday',name:'Birthday',cat:'Personal',w:1080,h:1080,bg:'linear-gradient(135deg,#f953c6 0%,#b91d73 100%)',label:'Bday'},
    {id:'quote',name:'Quote Card',cat:'Personal',w:1080,h:1080,bg:'linear-gradient(135deg,#373B44 0%,#4286f4 100%)',label:'Quote'},
    {id:'product',name:'Product Showcase',cat:'Business',w:1080,h:1080,bg:'linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%)',label:'Shop'},
    {id:'news',name:'News Banner',cat:'News',w:1200,h:630,bg:'linear-gradient(135deg,#141e30 0%,#243b55 100%)',label:'News'},
  ];
  const TPL_CATS=['All','Social','YouTube','Business','Personal','News'];
  const visibleTpls=tplCat==='All'?PHOTO_TPLS:PHOTO_TPLS.filter(t=>t.cat===tplCat);
  const applyTemplate=tpl=>{
    const canvas=canvasRef.current;if(!canvas)return;
    canvas.width=tpl.w;canvas.height=tpl.h;
    const ctx=canvas.getContext('2d');
    const offscreen=document.createElement('canvas');offscreen.width=tpl.w;offscreen.height=tpl.h;
    const octx=offscreen.getContext('2d');
    const stops=tpl.bg.match(/#[0-9a-fA-F]{3,6}/g)||['#0f2535','#0f3460'];
    const angle=135*Math.PI/180;
    const grd=octx.createLinearGradient(
      tpl.w/2+Math.cos(angle+Math.PI)*tpl.w*0.7,tpl.h/2+Math.sin(angle+Math.PI)*tpl.h*0.7,
      tpl.w/2+Math.cos(angle)*tpl.w*0.7,tpl.h/2+Math.sin(angle)*tpl.h*0.7
    );
    stops.forEach((c,i)=>grd.addColorStop(i/Math.max(1,stops.length-1),c));
    octx.fillStyle=grd;octx.fillRect(0,0,tpl.w,tpl.h);
    ctx.drawImage(offscreen,0,0);
    setImage(canvas.toDataURL());
  };
  const TABS=[{id:"templates",ic:"🎨",lb:"Templates"},{id:"filters",ic:"✦",lb:"Filters"},{id:"text",ic:"T",lb:"Text"},{id:"export",ic:"v",lb:"Export"}];
  return(
    <>
      <div className="lpanel">
        <div className="ttabs">{TABS.map(t=><button key={t.id} className={`tt ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}><span className="ic">{t.ic}</span>{t.lb}</button>)}</div>
        {tab==='templates'&&(
          <div className="pbody">
            <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>CANVAS TEMPLATES</div>
            <div className="tpl-cats">
              {TPL_CATS.map(c=><button key={c} className={`tpl-cat ${tplCat===c?'on':''}`} onClick={()=>setTplCat(c)}>{c}</button>)}
            </div>
            <div className="tpl-grid">
              {visibleTpls.map(tpl=>(
                <div key={tpl.id} className="tpl-card" onClick={()=>applyTemplate(tpl)}>
                  <div className="tpl-thumb" style={{background:tpl.bg}}>{tpl.label}</div>
                  <div className="tpl-name">{tpl.name}</div>
                  <div className="tpl-size">{tpl.w}x{tpl.h}</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:12,fontSize:11,color:'var(--muted)',lineHeight:1.6}}>Click a template to set canvas size and background. Then upload your image or add text on top.</div>
          </div>
        )}
        {tab==='filters'&&<FilterPanel filters={filters} onChange={setFilters} rotation={rot} onRotate={setRot}/>}
        {tab==='text'&&<TextPanel texts={texts} onChange={setTexts} canvasW={canvasRef.current?.width} canvasH={canvasRef.current?.height}/>}
        {tab==='export'&&<ExportPanel hasImage={!!image} onExport={doExport}/>}
      </div>
      <div className="carea">
        <div className="checker"/>
        {!image?(
          <label className="upzone">
            <input type="file" accept="image/*" onChange={handleFile} hidden/>
            <div className="uic">🖼️</div><p>Drop an image or click to upload</p><span>JPG · PNG · WebP · GIF</span>
          </label>
        ):(
          <div className="cwrap">
            <canvas ref={canvasRef} className="ecanvas"/>
            <div className="ctbar">
              <label className="cbtn" style={{cursor:'pointer'}}><input type="file" accept="image/*" onChange={handleFile} hidden/>📂 Change</label>
              <button className="cbtn" onClick={()=>{setImage(null);setFilters(DEF_F);setTexts([]);setRot(0);}}>✕ Clear</button>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

// VIDEO EDITOR
// ═══════════════════════════════════════════════════════
const fmtT=s=>{const m=Math.floor(s/60),sec=Math.floor(s%60);return `${m}:${sec.toString().padStart(2,'0')}`;};

function VideoEditor(){
  const vidRef=useRef(null);
  const [src,setSrc]=useState(null);
  const [dur,setDur]=useState(0);
  const [cur,setCur]=useState(0);
  const [ts,setTs]=useState(0);
  const [te,setTe]=useState(0);
  const [playing,setPlaying]=useState(false);
  const [texts,setTexts]=useState([]);
  const [tab,setTab]=useState('trim');
  const [exporting,setExp]=useState(false);
  const [expSeg,setExpSeg]=useState(null);
  const [splits,setSplits]=useState([]);
  const rafRef=useRef(null);

  const tick=useCallback(()=>{
    const v=vidRef.current;if(!v)return;
    setCur(v.currentTime);
    if(v.currentTime>=te){v.pause();v.currentTime=ts;setPlaying(false);return;}
    rafRef.current=requestAnimationFrame(tick);
  },[te,ts]);

  useEffect(()=>{
    if(playing)rafRef.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafRef.current);
  },[playing,tick]);

  const handleFile=e=>{const f=e.target.files[0];if(!f)return;setSrc(URL.createObjectURL(f));setTexts([]);setTs(0);setCur(0);setPlaying(false);};
  const onMeta=()=>{const v=vidRef.current;if(!v)return;setDur(v.duration);setTe(v.duration);};
  const togglePlay=()=>{
    const v=vidRef.current;if(!v)return;
    if(playing){v.pause();setPlaying(false);}
    else{if(v.currentTime>=te||v.currentTime<ts)v.currentTime=ts;v.play();setPlaying(true);}
  };

  const doExport=async(preset)=>{
    const v=vidRef.current;if(!v)return;setExp(true);
    const c=document.createElement('canvas');
    c.width=preset.w||v.videoWidth||1280;c.height=preset.h||v.videoHeight||720;
    const ctx=c.getContext('2d');
    let mime='video/webm;codecs=vp9';
    if(!MediaRecorder.isTypeSupported(mime))mime='video/webm';
    const recorder=new MediaRecorder(c.captureStream(30),{mimeType:mime});
    const chunks=[];
    recorder.ondataavailable=e=>chunks.push(e.data);
    recorder.onstop=()=>{
      const blob=new Blob(chunks,{type:mime.split(';')[0]});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='editpro_video.webm';a.click();
      URL.revokeObjectURL(url);setExp(false);
    };
    v.currentTime=ts;
    await new Promise(r=>{v.onseeked=r;});
    v.play();recorder.start();
    const draw=()=>{
      if(v.currentTime>=te){v.pause();recorder.stop();return;}
      ctx.drawImage(v,0,0,c.width,c.height);
      texts.forEach(t=>{
        ctx.save();ctx.font=`${t.bold?'bold ':''} ${Math.round(t.size*c.width/640)}px "${t.font}",sans-serif`;
        ctx.fillStyle=t.color;ctx.globalAlpha=t.opacity;
        if(t.shadow){ctx.shadowColor='rgba(0,0,0,.75)';ctx.shadowBlur=6;ctx.shadowOffsetX=2;ctx.shadowOffsetY=2;}
        ctx.fillText(t.text,Math.round(t.x*c.width/640),Math.round(t.y*c.height/360));
        ctx.restore();
      });
      requestAnimationFrame(draw);
    };
    draw();
  };

  const lp=dur>0?(ts/dur)*100:0;
  const wp=dur>0?((te-ts)/dur)*100:100;
  const pp=te>ts?Math.max(0,Math.min(100,((cur-ts)/(te-ts))*100)):0;
  const sortedSplits=[...splits].sort((a,b)=>a-b);
  const segments=dur>0?(()=>{const pts=[0,...sortedSplits,dur];return pts.slice(0,-1).map((s,i)=>({start:s,end:pts[i+1],index:i+1}));})():[];
  const addCut=()=>{if(!src||cur<=0||cur>=dur)return;if(splits.some(p=>Math.abs(p-cur)<0.2))return;setSplits(p=>[...p,cur]);};
  const exportSeg=async(seg)=>{const v=vidRef.current;if(!v)return;setExpSeg(seg.index);const c=document.createElement('canvas');c.width=v.videoWidth||1280;c.height=v.videoHeight||720;const ctx=c.getContext('2d');let mime='video/webm;codecs=vp9';if(!MediaRecorder.isTypeSupported(mime))mime='video/webm';const recorder=new MediaRecorder(c.captureStream(30),{mimeType:mime});const chunks=[];recorder.ondataavailable=e=>chunks.push(e.data);recorder.onstop=()=>{const blob=new Blob(chunks,{type:mime.split(';')[0]});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='clip_'+seg.index+'.webm';a.click();URL.revokeObjectURL(url);setExpSeg(null);};v.currentTime=seg.start;await new Promise(r=>{v.onseeked=r;});v.play();recorder.start();const draw=()=>{if(v.currentTime>=seg.end){v.pause();recorder.stop();return;}ctx.drawImage(v,0,0,c.width,c.height);requestAnimationFrame(draw);};draw();};
  const TABS=[{id:"trim",ic:"✂",lb:"Trim"},{id:"split",ic:"🔪",lb:"Split"},{id:"overlays",ic:"🎨",lb:"Overlays"},{id:"text",ic:"T",lb:"Text"},{id:"export",ic:"v",lb:"Export"}];

  return(
    <>
      <div className="lpanel">
        <div className="ttabs">{TABS.map(t=><button key={t.id} className={`tt ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}><span className="ic">{t.ic}</span>{t.lb}</button>)}</div>
        {tab==='trim'&&(
          <div className="pbody">
            <div className="stitle">Trim Settings</div>
            <div className="sg">
              <div className="sl"><span>Start Time</span><span>{fmtT(ts)}</span></div>
              <input type="range" min={0} max={dur} step={0.01} value={ts}
                onChange={e=>{const v=Math.min(+e.target.value,te-0.5);setTs(v);if(vidRef.current){vidRef.current.currentTime=v;setCur(v);}}}/>
            </div>
            <div className="sg">
              <div className="sl"><span>End Time</span><span>{fmtT(te)}</span></div>
              <input type="range" min={0} max={dur} step={0.01} value={te} onChange={e=>setTe(Math.max(+e.target.value,ts+0.5))}/>
            </div>
            {dur>0&&<><div className="div"/>
              <div className="tip">Clip: <strong>{fmtT(te-ts)}</strong> of {fmtT(dur)}</div>
              <button className="btn bs bfw" onClick={()=>{setTs(0);setTe(dur);}}>Reset Trim</button>
            </>}
            {!src&&<div className="es" style={{marginTop:20}}><div className="ei">🎬</div><p>Upload a video to trim</p></div>}
          </div>
        )}
        {tab==='overlays'&&(
          <div className="pbody">
            <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>VIDEO OVERLAY TEMPLATES</div>
            {[
              {id:'lower3rd',name:'Lower Third',desc:'Name + title bar at bottom',icon:'📝',
               texts:[{text:'Your Name',x:30,y:315,size:26,bold:true,color:'#ffffff',shadow:true,opacity:1,font:'Arial'},{text:'Title / Designation',x:30,y:345,size:16,bold:false,color:'#f0f0f0',shadow:true,opacity:0.9,font:'Arial'}]},
              {id:'title_card',name:'Title Card',desc:'Big centered title overlay',icon:'🎬',
               texts:[{text:'YOUR TITLE',x:320,y:155,size:40,bold:true,color:'#ffffff',shadow:true,opacity:1,font:'Arial'},{text:'Subtitle goes here',x:320,y:205,size:20,bold:false,color:'#dddddd',shadow:true,opacity:0.85,font:'Arial'}]},
              {id:'corner_brand',name:'Corner Watermark',desc:'Brand name top-right corner',icon:'💠',
               texts:[{text:'@YourBrand',x:480,y:22,size:16,bold:true,color:'#ffffff',shadow:true,opacity:0.7,font:'Arial'}]},
              {id:'subscribe',name:'Subscribe CTA',desc:'Like and subscribe overlay',icon:'🔔',
               texts:[{text:'Like and Subscribe!',x:160,y:330,size:22,bold:true,color:'#ff3333',shadow:true,opacity:1,font:'Arial'}]},
              {id:'quote_vid',name:'Quote Overlay',desc:'Inspirational quote style',icon:'💬',
               texts:[{text:'Your quote here',x:320,y:180,size:26,bold:false,color:'#ffffff',shadow:true,opacity:0.95,font:'Georgia'}]},
            ].map(tpl=>(
              <div key={tpl.id} className="vid-tpl-card" onClick={()=>setTexts(prev=>[...prev,...tpl.texts.map(t=>({...t,id:Date.now()+Math.random()}))])}>
                <div className="vid-tpl-icon">{tpl.icon}</div>
                <div className="vid-tpl-info">
                  <div className="vid-tpl-name">{tpl.name}</div>
                  <div className="vid-tpl-desc">{tpl.desc}</div>
                </div>
                <span style={{fontSize:11,color:'var(--accent)',fontWeight:600}}>+Add</span>
              </div>
            ))}
            <div style={{fontSize:11,color:'var(--muted)',marginTop:6,lineHeight:1.6}}>Click to add overlay. Fine-tune positions in the Text tab.</div>
          </div>
        )}
        {tab=="split"&&(<div className="pbody">{!src?(<div className="es" style={{marginTop:20}}><p>Upload a video to split</p></div>):(<><div className="tip" style={{marginBottom:10}}>Play then click Add Cut.</div><button className="btn bp bfw" onClick={addCut}>Add Cut at {fmtT(cur)}</button>{sortedSplits.length>0&&(<><div className="stitle">Cut Points</div>{sortedSplits.map(pt=>(<div key={pt} style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span>{fmtT(pt)}</span><button className="btn bs" onClick={()=>setSplits(p=>p.filter(x=>x!==pt))}>Remove</button></div>))}<button className="btn bs bfw" onClick={()=>setSplits([])}>Clear All</button></>)}{segments.length>1&&(<><div className="stitle">Segments ({segments.length})</div>{segments.map(seg=>(<div key={seg.index} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 8px",background:"var(--panel2)",borderRadius:6,marginBottom:6}}><div><div style={{fontSize:12,fontWeight:600}}>Clip {seg.index}</div><div style={{fontSize:11}}>{fmtT(seg.start)} to {fmtT(seg.end)}</div></div><button className="btn bp" onClick={()=>exportSeg(seg)} disabled={expSeg!==null}>{expSeg===seg.index?"Exporting...":"Export"}</button></div>))}<button className="btn bp bfw" onClick={()=>segments.forEach(s=>exportSeg(s))} disabled={expSeg!==null} style={{marginTop:4}}>{expSeg!==null?"Exporting...":"Export All Clips"}</button></>)}</>)}</div>)}
        {tab==='text'&&<TextPanel texts={texts} onChange={setTexts} canvasW={640} canvasH={360}/>}
        {tab==='export'&&<ExportPanel hasImage={!!src} onExport={doExport} isVideo/>}
      </div>
      <div className="varea">
        <div className="checker"/>
        {!src?(
          <label className="upzone" style={{zIndex:1}}>
            <input type="file" accept="video/*" onChange={handleFile} hidden/>
            <div className="uic">🎬</div><p>Drop a video or click to upload</p><span>MP4 · WebM · MOV · AVI</span>
          </label>
        ):(
          <>
            <div className="vcont">
              <video ref={vidRef} src={src} className="evid" onLoadedMetadata={onMeta}
                onTimeUpdate={()=>setCur(vidRef.current?.currentTime||0)} onEnded={()=>setPlaying(false)} playsInline/>
              {texts.length>0&&(
                <div className="vto">
                  {texts.map(t=>(
                    <span key={t.id} className="vti" style={{left:`${(t.x/640)*100}%`,top:`${(t.y/360)*100}%`,
                      fontSize:t.size,fontFamily:t.font,color:t.color,opacity:t.opacity,fontWeight:t.bold?700:400}}>
                      {t.text}
                    </span>
                  ))}
                </div>
              )}
            </div>
            <div className="vctrl">
              <div style={{position:'relative',height:26,background:'var(--panel2)',borderRadius:5,marginBottom:8,overflow:'hidden'}}>
                <div style={{position:'absolute',top:0,height:'100%',left:`${lp}%`,width:`${wp}%`,
                  background:'linear-gradient(135deg,rgba(43,181,160,.4),rgba(168,85,247,.4))',border:'2px solid var(--accent)',borderRadius:4}}/>
                <div style={{position:'absolute',top:0,bottom:0,left:`${pp*(wp/100)+lp}%`,width:2,background:'#fff',opacity:.8}}/>
              </div>
              <div className="tlbls"><span>{fmtT(ts)}</span><span>Duration: {fmtT(te-ts)}</span><span>{fmtT(te)}</span></div>
              <div className="prow" style={{marginTop:8}}>
                <button className="playbtn" onClick={togglePlay}>{playing?'⏸':'▶'}</button>
                <span className="tdsp">{fmtT(cur)} / {fmtT(te)}</span>
                <div className="pbwrap" onClick={e=>{const r=e.currentTarget.getBoundingClientRect();const t2=ts+((e.clientX-r.left)/r.width)*(te-ts);if(vidRef.current)vidRef.current.currentTime=t2;setCur(t2);}}>
                  <div className="pbfill" style={{width:`${pp}%`}}/>
                </div>
                <label className="cbtn" style={{cursor:'pointer',flexShrink:0}}><input type="file" accept="video/*" onChange={handleFile} hidden/>📂 Change</label>
              </div>
            </div>
          </>
        )}
      </div>
      {exporting&&<div className="ov"><div style={{fontSize:38}}>⏳</div><p style={{color:'#fff',fontSize:15,fontWeight:600}}>Exporting video…</p><p style={{color:'#888',fontSize:12}}>Processing frames — please wait</p></div>}
    </>
  );
}

// ═══════════════════════════════════════════════════════
// TEXT TO SPEECH PANEL
// ═══════════════════════════════════════════════════════
function TTSPanel(){
  const [text,setText]=useState('');
  const [lang,setLang]=useState('ta-IN');
  const [voices,setVoices]=useState([]);
  const [selVoice,setSelVoice]=useState('');
  const [rate,setRate]=useState(0.85);
  const [pitch,setPitch]=useState(1);
  const [speaking,setSpeaking]=useState(false);
  const [inputMode,setInputMode]=useState('phonetic');
  const [ttsCommitted,setTtsCommitted]=useState('');
  const [ttsRawBuf,setTtsRawBuf]=useState('');
  useEffect(()=>{
    if(inputMode==='phonetic') setText(ttsCommitted+transliterate(ttsRawBuf));
  },[ttsCommitted,ttsRawBuf]);
  // Recording states
  const [recMode,setRecMode]=useState('tab'); // 'tab' | 'mic'
  const [recState,setRecState]=useState('idle'); // idle | waiting | recording | done
  const [recURL,setRecURL]=useState(null);
  const [recSecs,setRecSecs]=useState(0);
  const inputRef=useRef(null);
  const recorderRef=useRef(null);
  const recTimerRef=useRef(null);
  const captureStreamRef=useRef(null);

  useEffect(()=>{
    const load=()=>{
      const vs=speechSynthesis.getVoices();
      setVoices(vs);
      if(vs.length>0&&!selVoice){
        const tamil=vs.find(v=>v.lang.startsWith('ta'));
        if(tamil)setSelVoice(tamil.name);
      }
    };
    speechSynthesis.onvoiceschanged=load;
    load();
    return()=>{speechSynthesis.onvoiceschanged=null;};
  },[]);

  const filteredVoices=voices.filter(v=>lang==='ta-IN'?v.lang.startsWith('ta'):v.lang.startsWith('en'));

  const buildUtt=()=>{
    const utt=new SpeechSynthesisUtterance(text);
    utt.lang=lang; utt.rate=rate; utt.pitch=pitch;
    if(selVoice){const v=voices.find(v=>v.name===selVoice);if(v)utt.voice=v;}
    return utt;
  };

  const speak=()=>{
    if(!text.trim()||speaking)return;
    speechSynthesis.cancel();
    const utt=buildUtt();
    utt.onstart=()=>setSpeaking(true);
    utt.onend=()=>setSpeaking(false);
    utt.onerror=()=>setSpeaking(false);
    speechSynthesis.speak(utt);
  };

  const stop=()=>{
    speechSynthesis.cancel();
    setSpeaking(false);
    if(recorderRef.current&&recorderRef.current.state==='recording'){
      recorderRef.current.stop();
    }
    clearInterval(recTimerRef.current);
    if(captureStreamRef.current)captureStreamRef.current.getTracks().forEach(t=>t.stop());
    setRecState('idle');
  };

  // ── TAB AUDIO CAPTURE (Chrome/Edge) ──
  const recordViaTab=async()=>{
    if(!text.trim())return;
    setRecState('waiting');
    setRecURL(null);
    try{
      const stream=await navigator.mediaDevices.getDisplayMedia({
        video:{displaySurface:'browser'},
        audio:{suppressLocalAudioPlayback:false},
        preferCurrentTab:true,
      });
      captureStreamRef.current=stream;
      const audioTracks=stream.getAudioTracks();
      stream.getVideoTracks().forEach(t=>t.stop()); // discard video
      if(audioTracks.length===0){
        stream.getTracks().forEach(t=>t.stop());
        alert('⚠️ No audio captured.\n\nIn the share dialog, please:\n1. Select this browser tab\n2. Check ✅ "Share tab audio" at the bottom\n3. Click Share');
        setRecState('idle');return;
      }
      const audioStream=new MediaStream(audioTracks);
      const chunks=[];
      const mime=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
      const rec=new MediaRecorder(audioStream,{mimeType:mime});
      recorderRef.current=rec;
      rec.ondataavailable=e=>e.data.size>0&&chunks.push(e.data);
      rec.onstop=()=>{
        clearInterval(recTimerRef.current);
        const blob=new Blob(chunks,{type:mime.split(';')[0]});
        setRecURL(URL.createObjectURL(blob));
        setRecState('done');
        stream.getTracks().forEach(t=>t.stop());
      };
      rec.start(100);
      setRecState('recording');
      setRecSecs(0);
      recTimerRef.current=setInterval(()=>setRecSecs(s=>s+1),1000);
      // Play TTS — recording stops when speech ends
      speechSynthesis.cancel();
      const utt=buildUtt();
      utt.onstart=()=>setSpeaking(true);
      utt.onend=()=>{
        setSpeaking(false);
        setTimeout(()=>{if(rec.state==='recording')rec.stop();},400);
      };
      utt.onerror=()=>{setSpeaking(false);if(rec.state==='recording')rec.stop();};
      setTimeout(()=>speechSynthesis.speak(utt),300);
    }catch(e){
      setRecState('idle');
      if(e.name!=='NotAllowedError'){
        alert('Could not start recording: '+e.message);
      }
    }
  };

  // ── MIC CAPTURE FALLBACK ──
  const recordViaMic=async()=>{
    if(!text.trim())return;
    setRecURL(null);
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      captureStreamRef.current=stream;
      const chunks=[];
      const mime=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
      const rec=new MediaRecorder(stream,{mimeType:mime});
      recorderRef.current=rec;
      rec.ondataavailable=e=>e.data.size>0&&chunks.push(e.data);
      rec.onstop=()=>{
        clearInterval(recTimerRef.current);
        const blob=new Blob(chunks,{type:mime.split(';')[0]});
        setRecURL(URL.createObjectURL(blob));
        setRecState('done');
        stream.getTracks().forEach(t=>t.stop());
      };
      rec.start(100);
      setRecState('recording');
      setRecSecs(0);
      recTimerRef.current=setInterval(()=>setRecSecs(s=>s+1),1000);
      speechSynthesis.cancel();
      const utt=buildUtt();
      utt.onstart=()=>setSpeaking(true);
      utt.onend=()=>{
        setSpeaking(false);
        setTimeout(()=>{if(rec.state==='recording')rec.stop();},600);
      };
      utt.onerror=()=>{setSpeaking(false);if(rec.state==='recording')rec.stop();};
      setTimeout(()=>speechSynthesis.speak(utt),200);
    }catch(e){
      setRecState('idle');
      alert('Microphone access denied. Please allow microphone permission.');
    }
  };

  const startRecording=()=>recMode==='tab'?recordViaTab():recordViaMic();

  const downloadRec=()=>{
    if(!recURL)return;
    const a=document.createElement('a');
    a.href=recURL;
    a.download=`smartedit_tts_${lang==='ta-IN'?'tamil':'english'}.webm`;
    a.click();
  };

  const insertChar=(c)=>{
    const el=inputRef.current;
    if(!el){setText(t=>t+c);return;}
    const s=el.selectionStart,e=el.selectionEnd;
    const nv=text.slice(0,s)+c+text.slice(e);
    setText(nv);
    setTimeout(()=>{el.focus();el.setSelectionRange(s+c.length,s+c.length)},0);
  };
  const backspaceTTS=()=>{
    const el=inputRef.current;if(!el)return;
    const s=el.selectionStart;if(s===0)return;
    setText(text.slice(0,s-1)+text.slice(s));
    setTimeout(()=>{el.focus();el.setSelectionRange(s-1,s-1)},0);
  };
  const ttsImeKeyDown=(e)=>{
    if(inputMode!=='phonetic') return;
    if(e.metaKey||e.ctrlKey) return;
    e.preventDefault();
    if(e.key==='Backspace'){
      if(ttsRawBuf.length>0) setTtsRawBuf(b=>b.slice(0,-1));
      else setTtsCommitted(c=>[...c].slice(0,-1).join(''));
    } else if(e.key===' '){
      setTtsCommitted(c=>c+transliterate(ttsRawBuf)+' '); setTtsRawBuf('');
    } else if(e.key.length===1){
      setTtsRawBuf(b=>b+e.key);
    }
  };
  const switchTtsMode=(m)=>{
    if(m==='phonetic'){ setTtsCommitted(text); setTtsRawBuf(''); }
    else if(ttsRawBuf){ setText(ttsCommitted+transliterate(ttsRawBuf)); setTtsRawBuf(''); }
    setInputMode(m);
  };
  const ttsDisplayVal=inputMode==='phonetic'?(ttsCommitted+transliterate(ttsRawBuf)):text;

  const SAMPLE_TA=['வணக்கம்','நன்றி','தமிழ்நாடு','இந்தியா','YouTube','Instagram'];
  const SAMPLE_EN=['Hello World','Subscribe now','Like and share','Follow us'];

  const mm=Math.floor(recSecs/60),ss2=recSecs%60;
  const recTime=`${mm.toString().padStart(2,'0')}:${ss2.toString().padStart(2,'0')}`;

  return(
    <div className="pbody">
      {/* Language */}
      <div className="stitle">Language · மொழி</div>
      <div className="lang-tabs">
        <button className={`lang-tab ${lang==='ta-IN'?'on':''}`} onClick={()=>{setLang('ta-IN');setSelVoice('');switchTtsMode('phonetic');}}>🇮🇳 Tamil</button>
        <button className={`lang-tab ${lang==='en-US'?'on':''}`} onClick={()=>{setLang('en-US');setSelVoice('');switchTtsMode('direct');}}>🇬🇧 English</button>
      </div>

      {/* Input mode */}
      {lang==='ta-IN'&&(
        <div style={{display:'flex',gap:4,marginBottom:9}}>
          <button className={`btn ${inputMode==='direct'?'bp':'bs'}`} style={{flex:1,fontSize:10}} onClick={()=>switchTtsMode('direct')}>Direct</button>
          <button className={`btn ${inputMode==='keyboard'?'bp':'bs'}`} style={{flex:1,fontSize:10}} onClick={()=>switchTtsMode('keyboard')}>TA கீபோர்டு</button>
          <button className={`btn ${inputMode==='phonetic'?'bp':'bs'}`} style={{flex:1,fontSize:10}} onClick={()=>switchTtsMode('phonetic')}>Phonetic</button>
        </div>
      )}

      {/* Text area */}
      <div className="tig">
        <label>
          Text to Speak
          {lang==='ta-IN'&&inputMode==='phonetic'&&ttsRawBuf&&<span style={{float:'right',fontSize:10,color:'var(--orange)'}}>typing: {ttsRawBuf}</span>}
        </label>
        <textarea ref={inputRef} className="tinp" rows={3}
          placeholder={lang==='ta-IN'&&inputMode==='phonetic'?'Type phonetically — va=வ  ka=க  th=த  zh=ழ':lang==='ta-IN'?'தமிழில் தட்டச்சு செய்யவும்…':'Enter text to convert to speech…'}
          value={ttsDisplayVal}
          onChange={lang==='ta-IN'&&inputMode==='phonetic'?()=>{}:e=>setText(e.target.value)}
          onKeyDown={lang==='ta-IN'&&inputMode==='phonetic'?ttsImeKeyDown:undefined}
          style={lang==='ta-IN'&&inputMode==='phonetic'?{fontFamily:"'Noto Sans Tamil',system-ui",fontSize:16}:{}}
        />
      </div>

      {/* Tamil keyboard for TTS */}
      {lang==='ta-IN'&&inputMode==='keyboard'&&(
        <TamilKeyboard onInsert={insertChar} onBackspace={backspaceTTS} onSpace={()=>insertChar(' ')}/>
      )}

      {/* Quick samples */}
      <div className="stitle" style={{marginTop:4}}>Quick Phrases</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:10}}>
        {(lang==='ta-IN'?SAMPLE_TA:SAMPLE_EN).map(s=>(
          <button key={s} className="fp" onClick={()=>setText(t=>t?(t+' '+s):s)}>{s}</button>
        ))}
      </div>

      {/* Voice selector */}
      {filteredVoices.length>0&&(
        <div className="tig">
          <label>Voice</label>
          <select className="tinp" value={selVoice} onChange={e=>setSelVoice(e.target.value)}>
            <option value="">-- Auto select --</option>
            {filteredVoices.map(v=><option key={v.name} value={v.name}>{v.name} ({v.lang})</option>)}
          </select>
        </div>
      )}
      {filteredVoices.length===0&&lang==='ta-IN'&&(
        <div className="tip">No Tamil voice found. Install Tamil language pack in Windows Settings → Time &amp; Language → Language.</div>
      )}

      {/* Rate & Pitch */}
      <div className="sg">
        <div className="sl"><span>Speed</span><span>{rate}x</span></div>
        <input type="range" min={0.4} max={2} step={0.05} value={rate} onChange={e=>setRate(+e.target.value)}/>
      </div>
      <div className="sg">
        <div className="sl"><span>Pitch</span><span>{pitch}</span></div>
        <input type="range" min={0} max={2} step={0.1} value={pitch} onChange={e=>setPitch(+e.target.value)}/>
      </div>

      {/* ── Speak controls ── */}
      <div style={{display:'flex',gap:6,marginTop:4}}>
        <button className="btn bp" style={{flex:2}} onClick={speak} disabled={!text.trim()||speaking||recState==='recording'}>
          {speaking?'🔊 Speaking…':'▶ Speak'}
        </button>
        <button className="btn bd" style={{flex:1}} onClick={stop} disabled={!speaking&&recState!=='recording'}>⏹ Stop</button>
      </div>

      <div className="div"/>

      {/* ── RECORD TTS SECTION ── */}
      <div className="stitle">🔴 Record Voice Output</div>

      {/* Recording method selector */}
      <div style={{display:'flex',gap:5,marginBottom:9}}>
        <button className={`btn ${recMode==='tab'?'bp':'bs'}`} style={{flex:1,fontSize:10}}
          onClick={()=>setRecMode('tab')} title="Captures TTS audio from the browser tab (Chrome/Edge)">
          📺 Tab Audio
        </button>
        <button className={`btn ${recMode==='mic'?'bp':'bs'}`} style={{flex:1,fontSize:10}}
          onClick={()=>setRecMode('mic')} title="Records via microphone — place mic near speakers">
          🎙 Microphone
        </button>
      </div>

      {recMode==='tab'&&(
        <div className="tip" style={{marginBottom:9}}>
          <b>Tab Audio (Chrome/Edge):</b> A share dialog will appear.<br/>
          1. Select <b>this browser tab</b><br/>
          2. Check ✅ <b>"Share tab audio"</b><br/>
          3. Click <b>Share</b> — TTS plays &amp; records automatically
        </div>
      )}
      {recMode==='mic'&&(
        <div className="tip" style={{marginBottom:9}}>
          <b>Microphone mode:</b> Mic records while TTS plays through speakers.<br/>
          Works best with speakers (not headphones) or a quiet room.
        </div>
      )}

      {/* Recording status */}
      {recState==='recording'&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
          background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',
          borderRadius:'var(--rs)',marginBottom:9}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:'var(--red)',
            animation:'pulse 1s infinite',flexShrink:0}}/>
          <span style={{fontSize:12,color:'var(--red)',fontWeight:600}}>Recording… {recTime}</span>
          <span style={{fontSize:11,color:'var(--muted)',marginLeft:'auto'}}>Will stop when speech ends</span>
        </div>
      )}
      {recState==='waiting'&&(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
          background:'rgba(43,181,160,.1)',border:'1px solid var(--accent)',
          borderRadius:'var(--rs)',marginBottom:9}}>
          <span style={{fontSize:16}}>⏳</span>
          <span style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>Waiting for tab share… select tab &amp; check audio</span>
        </div>
      )}

      {/* Start record button */}
      {recState==='idle'||recState==='done'?(
        <button className="btn bfw" style={{background:'var(--red)',color:'#fff',marginBottom:6,fontSize:12,padding:'9px'}}
          onClick={startRecording} disabled={!text.trim()}>
          🔴 {recState==='done'?'Record Again':'Record Voice as Audio File'}
        </button>
      ):(
        <button className="btn bd bfw" style={{marginBottom:6}} onClick={stop}>⏹ Stop Recording</button>
      )}

      {/* Recorded audio result */}
      {recState==='done'&&recURL&&(
        <div style={{background:'var(--panel2)',border:'1px solid var(--border)',borderRadius:'var(--rs)',padding:10,marginBottom:6}}>
          <div style={{fontSize:11,color:'var(--green)',fontWeight:600,marginBottom:8}}>✓ Recording complete!</div>
          <audio src={recURL} controls style={{width:'100%',marginBottom:8,borderRadius:4}}/>
          <button className="btn bp bfw" onClick={downloadRec}>↓ Download Audio (.webm)</button>
        </div>
      )}

      <button className="btn bs bfw" style={{marginTop:4}} onClick={()=>{setText('');setRecURL(null);setRecState('idle');}}>Clear All</button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// VOICE RECORDER PANEL
// ═══════════════════════════════════════════════════════
function RecorderPanel(){
  const [state,setState]=useState('idle'); // idle | recording | done
  const [secs,setSecs]=useState(0);
  const [audioURL,setAudioURL]=useState(null);
  const [playSpeed,setPlaySpeed]=useState(1);
  const [bars,setBars]=useState(Array(24).fill(4));
  const mediaRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  const audioRef=useRef(null);
  const analyserRef=useRef(null);
  const animRef=useRef(null);

  const startRec=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const audioCtx=new AudioContext();
      const source=audioCtx.createMediaStreamSource(stream);
      const analyser=audioCtx.createAnalyser();
      analyser.fftSize=64;
      source.connect(analyser);
      analyserRef.current=analyser;

      const rec=new MediaRecorder(stream);
      chunksRef.current=[];
      rec.ondataavailable=e=>chunksRef.current.push(e.data);
      rec.onstop=()=>{
        const blob=new Blob(chunksRef.current,{type:'audio/webm'});
        setAudioURL(URL.createObjectURL(blob));
        setState('done');
        stream.getTracks().forEach(t=>t.stop());
        cancelAnimationFrame(animRef.current);
      };
      rec.start();
      mediaRef.current=rec;
      setState('recording');
      setSecs(0);
      timerRef.current=setInterval(()=>setSecs(s=>s+1),1000);

      const drawBars=()=>{
        const data=new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        setBars(Array.from({length:24},(_,i)=>{
          const v=data[Math.floor(i*data.length/24)]/255;
          return Math.max(4,Math.round(v*32));
        }));
        animRef.current=requestAnimationFrame(drawBars);
      };
      drawBars();
    }catch(e){
      alert('Microphone access denied. Please allow microphone permission.');
    }
  };

  const stopRec=()=>{
    mediaRef.current?.stop();
    clearInterval(timerRef.current);
    cancelAnimationFrame(animRef.current);
    setBars(Array(24).fill(4));
  };

  const reset=()=>{
    setState('idle');setAudioURL(null);setSecs(0);
    setBars(Array(24).fill(4));
  };

  const download=()=>{
    if(!audioURL)return;
    const a=document.createElement('a');a.href=audioURL;a.download='editpro_voice.webm';a.click();
  };

  useEffect(()=>{
    if(audioRef.current)audioRef.current.playbackRate=playSpeed;
  },[playSpeed]);

  const mm=Math.floor(secs/60),ss=secs%60;
  const timeStr=`${mm.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;

  return(
    <div className="pbody">
      <div className="stitle">Voice Recorder · குரல் பதிவு</div>

      <div className="rec-display">
        <div className={`rec-circle ${state}`}
          onClick={state==='idle'?startRec:state==='recording'?stopRec:null}
          title={state==='idle'?'Click to record':state==='recording'?'Click to stop':''}>
          {state==='idle'?'🎙':state==='recording'?'⏹':'✓'}
        </div>
        <div className="rec-time">{timeStr}</div>
        <div className="rec-status">
          {state==='idle'?'Click mic to start recording':state==='recording'?'Recording…':'Recording complete'}
        </div>
        {/* Waveform visualizer */}
        <div className="waveform">
          <div className="waveform-inner">
            {bars.map((h,i)=>(
              <div key={i} className="wbar" style={{height:h,opacity:state==='recording'?1:0.4}}/>
            ))}
          </div>
        </div>
      </div>

      {state==='idle'&&(
        <div className="tip" style={{marginTop:10}}>
          Click the microphone to start. Supports recording voice-overs, narration, or sound effects.
        </div>
      )}

      {state==='recording'&&(
        <div style={{marginTop:10}}>
          <button className="btn bd bfw" onClick={stopRec}>⏹ Stop Recording</button>
        </div>
      )}

      {state==='done'&&audioURL&&(
        <>
          <div className="div"/>
          <div className="stitle">Playback &amp; Effects</div>
          <audio ref={audioRef} src={audioURL} controls style={{width:'100%',marginBottom:10,borderRadius:6}}/>
          <div className="sg">
            <div className="sl"><span>Playback Speed</span><span>{playSpeed}x</span></div>
            <input type="range" min={0.5} max={2} step={0.1} value={playSpeed}
              onChange={e=>{setPlaySpeed(+e.target.value);if(audioRef.current)audioRef.current.playbackRate=+e.target.value;}}/>
          </div>
          <div style={{display:'flex',gap:6,marginTop:6}}>
            <button className="btn bp" style={{flex:2}} onClick={download}>↓ Download Recording</button>
            <button className="btn bd" style={{flex:1}} onClick={reset}>🗑 New</button>
          </div>
        </>
      )}
    </div>
  );
}

// AUDIO MODE
// ═══════════════════════════════════════════════════════
function AudioMode(){
  const [tab,setTab]=useState('tts');
  const TABS=[{id:'tts',ic:'🔊',lb:'Text to Voice'},{id:'record',ic:'🎙',lb:'Recorder'}];
  return(

        </div>
        {tab==='tts'&&<TTSPanel/>}
